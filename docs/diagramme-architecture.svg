<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1300 900" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="arr-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#2563eb"/></marker>
    <marker id="arr-purple" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#7c3aed"/></marker>
  </defs>
  <rect width="1300" height="900" fill="#f8fafc"/>
  <text x="650" y="36" text-anchor="middle" font-size="20" font-weight="bold" fill="#0f172a">Architecture MVC — BookStore App</text>
  <text x="650" y="56" text-anchor="middle" font-size="12" fill="#64748b">Angular 21 · Spring Boot 3.2 · MySQL 8 · Gemini AI (LangChain4j)</text>
  <line x1="60" y1="66" x2="1240" y2="66" stroke="#cbd5e1" stroke-width="1.5"/>

  <!-- ══ FRONTEND ══ -->
  <rect x="30" y="78" width="550" height="688" rx="14" fill="#eff6ff" stroke="#3b82f6" stroke-width="2"/>
  <rect x="30" y="78" width="550" height="34" rx="14" fill="#2563eb"/>
  <rect x="30" y="98" width="550" height="14" fill="#2563eb"/>
  <text x="305" y="100" text-anchor="middle" font-size="13" font-weight="bold" fill="#fff">FRONTEND — Angular 21</text>

  <!-- VUE -->
  <rect x="50" y="124" width="510" height="172" rx="8" fill="#fff" stroke="#bfdbfe" stroke-width="1.2"/>
  <text x="305" y="143" text-anchor="middle" font-size="11" font-weight="bold" fill="#1d4ed8">VUE  (Templates HTML + Tailwind CSS)</text>
  <text x="66" y="161" font-size="10" fill="#334155">• home-page · catalog · book-details · cart · checkout</text>
  <text x="66" y="177" font-size="10" fill="#334155">• orders-page · tracking-page · user-profile · wishlist</text>
  <text x="66" y="193" font-size="10" fill="#334155">• login (multi-mode: connexion / inscription / reset-password)</text>
  <text x="66" y="209" font-size="10" fill="#334155">• admin-dashboard (HTML + SCSS, light/dark)</text>
  <text x="66" y="225" font-size="10" fill="#334155">• navbar · footer · sidebar-filters · custom-dropdown · hero-promo</text>
  <text x="66" y="241" font-size="10" fill="#334155">• chatbot (Gemini AI, widget flottant, timeout 55s)</text>
  <text x="66" y="257" font-size="10" fill="#334155">• book-card · book-grid · loader · rating · hero-banner</text>
  <text x="66" y="273" font-size="10" fill="#64748b">  ThemeService (dark/light) · LanguageService (FR/EN) · Tailwind dark:</text>
  <text x="66" y="289" font-size="10" fill="#64748b">  authGuard · adminGuard · authInterceptor · errorInterceptor · loadingInterceptor</text>

  <!-- CONTROLLER -->
  <rect x="50" y="308" width="510" height="136" rx="8" fill="#fff" stroke="#bfdbfe" stroke-width="1.2"/>
  <text x="305" y="327" text-anchor="middle" font-size="11" font-weight="bold" fill="#1d4ed8">CONTRÔLEUR  (Components TypeScript)</text>
  <text x="66" y="346" font-size="10" fill="#334155">• HomePageComponent · CatalogComponent · BookDetailsComponent</text>
  <text x="66" y="363" font-size="10" fill="#334155">• CartComponent · CheckoutComponent · TrackingPageComponent · OrdersPage</text>
  <text x="66" y="380" font-size="10" fill="#334155">• LoginPage (send-code / verify-signup / reset-password)</text>
  <text x="66" y="397" font-size="10" fill="#334155">• UserProfilePage · WishlistPage · ChatbotComponent</text>
  <text x="66" y="414" font-size="10" fill="#334155">• AdminDashboardComponent (canActivate: adminGuard)</text>
  <text x="66" y="431" font-size="10" fill="#334155">• Angular Router (lazy loading) · ReactiveFormsModule · NgZone · CDR</text>

  <!-- SERVICES -->
  <rect x="50" y="456" width="510" height="168" rx="8" fill="#fff" stroke="#bfdbfe" stroke-width="1.2"/>
  <text x="305" y="475" text-anchor="middle" font-size="11" font-weight="bold" fill="#1d4ed8">SERVICES  (Couche données Frontend)</text>
  <text x="66" y="494" font-size="10" fill="#334155">• AuthService — login, sendSignupCode, verifySignup, sendResetCode, resetPassword</text>
  <text x="66" y="511" font-size="10" fill="#334155">• OrderService — getMyOrders, getOrderById, createOrder</text>
  <text x="66" y="528" font-size="10" fill="#334155">• BookService — getBooks, getBestSellers, getBookById, searchBooks, addReview, getAiSummary</text>
  <text x="66" y="545" font-size="10" fill="#334155">• CartService — localStorage par user, BehaviorSubject, vérif stock, max 10/livre</text>
  <text x="66" y="562" font-size="10" fill="#334155">• WishlistService — localStorage par user, toggle, BehaviorSubject</text>
  <text x="66" y="579" font-size="10" fill="#334155">• ChatService — ask(msg) timeout 55s, getBookSummary(id)</text>
  <text x="66" y="596" font-size="10" fill="#334155">• RecommendationService — getRecommendations() → {type, books[]}</text>
  <text x="66" y="613" font-size="10" fill="#334155">• ThemeService · LanguageService · UserService · HttpClient + JWT interceptor</text>

  <!-- MODELS FRONT -->
  <rect x="50" y="636" width="510" height="118" rx="8" fill="#fff" stroke="#bfdbfe" stroke-width="1.2"/>
  <text x="305" y="655" text-anchor="middle" font-size="11" font-weight="bold" fill="#1d4ed8">MODÈLES  (Interfaces TypeScript)</text>
  <text x="66" y="674" font-size="10" fill="#334155">• Book { id, title, author[], price, finalPrice, discount, rating, quantity, status, featured… }</text>
  <text x="66" y="691" font-size="10" fill="#334155">• Order { id, status, totalAmount, trackingNumber, items[], shippingAddress, orderDate }</text>
  <text x="66" y="708" font-size="10" fill="#334155">• CartItem · Cart · OrderItem · User · BookReview · Wishlist</text>
  <text x="66" y="725" font-size="10" fill="#334155">• AuthRequest · AuthResponse · RegisterRequest</text>
  <text x="66" y="742" font-size="10" fill="#334155">• ChatMessage { role: 'user' | 'bot', text }</text>

  <!-- ══ BACKEND ══ -->
  <rect x="720" y="78" width="550" height="688" rx="14" fill="#f0fdf4" stroke="#16a34a" stroke-width="2"/>
  <rect x="720" y="78" width="550" height="34" rx="14" fill="#15803d"/>
  <rect x="720" y="98" width="550" height="14" fill="#15803d"/>
  <text x="995" y="100" text-anchor="middle" font-size="13" font-weight="bold" fill="#fff">BACKEND — Spring Boot 3.2</text>

  <!-- CONTROLLERS BACK -->
  <rect x="740" y="124" width="510" height="188" rx="8" fill="#fff" stroke="#bbf7d0" stroke-width="1.2"/>
  <text x="995" y="143" text-anchor="middle" font-size="11" font-weight="bold" fill="#15803d">CONTRÔLEUR  (@RestController)</text>
  <text x="756" y="162" font-size="10" fill="#334155">• BookController      GET/POST/DELETE /api/books  (best-sellers, search, categories)</text>
  <text x="756" y="179" font-size="10" fill="#334155">• OrderController     POST /orders · GET /orders/my · GET /orders/{id} · PATCH status</text>
  <text x="756" y="196" font-size="10" fill="#334155">• AuthController      send-code/signup · verify-signup · send-code/reset · reset-password · login</text>
  <text x="756" y="213" font-size="10" fill="#334155">• AdminController     /api/admin/** (ROLE_ADMIN) — stats, livres, stock, commandes, users</text>
  <text x="756" y="230" font-size="10" fill="#334155">• ChatController      GET /chat/ask · GET /chat/summary/{id}  (Gemini AI LangChain4j)</text>
  <text x="756" y="247" font-size="10" fill="#334155">• RecommendationController  GET /recommendations (scoring: auteur×5 + catégorie×3 + rating×2)</text>
  <text x="756" y="264" font-size="10" fill="#334155">• ReviewController    GET/POST /books/{id}/reviews  (recalcul rating auto)</text>
  <text x="756" y="281" font-size="10" fill="#334155">• ReviewStatsController · HelloController</text>
  <text x="756" y="298" font-size="10" fill="#334155">  CORS · @CrossOrigin · Spring Security filter chain · @PreAuthorize("hasRole('ADMIN')")</text>

  <!-- SERVICES BACK -->
  <rect x="740" y="324" width="510" height="152" rx="8" fill="#fff" stroke="#bbf7d0" stroke-width="1.2"/>
  <text x="995" y="343" text-anchor="middle" font-size="11" font-weight="bold" fill="#15803d">SERVICE  (@Service + @Transactional)</text>
  <text x="756" y="362" font-size="10" fill="#334155">• OrderService  — createOrder, getOrderById, getOrdersByUserId, updateStatus</text>
  <text x="756" y="379" font-size="10" fill="#334155">  → décrémente stock · crée StockMovement(SALE) · envoie email</text>
  <text x="756" y="396" font-size="10" fill="#334155">  → @Transactional(readOnly=true) + init @ElementCollection EAGER</text>
  <text x="756" y="413" font-size="10" fill="#334155">  → si ANNULEE : retour stock automatique</text>
  <text x="756" y="430" font-size="10" fill="#334155">• EmailService  — sendOrderConfirmation, sendStatusUpdate, sendVerificationCode</text>
  <text x="756" y="447" font-size="10" fill="#334155">  → HTML emails · bloc Chronopost si EXPEDIEE · codes 6 chiffres 15min</text>
  <text x="756" y="464" font-size="10" fill="#334155">  → N° Chronopost : CP{orderId}{random5}FR (généré auto dans AdminController)</text>

  <!-- REPOSITORIES -->
  <rect x="740" y="488" width="510" height="130" rx="8" fill="#fff" stroke="#bbf7d0" stroke-width="1.2"/>
  <text x="995" y="507" text-anchor="middle" font-size="11" font-weight="bold" fill="#15803d">REPOSITORY  (JpaRepository + @Query natives)</text>
  <text x="756" y="526" font-size="10" fill="#334155">• BookRepository  — searchByKeyword, findByCategory, findBestSellersRealtime</text>
  <text x="756" y="543" font-size="10" fill="#334155">  decrementStock, incrementStock, getCategoryStats, findLowStock/OutOfStock</text>
  <text x="756" y="560" font-size="10" fill="#334155">• OrderRepository  — findByUserId, findAdminOrderSummaries, countByStatus, sumTotalAmount</text>
  <text x="756" y="577" font-size="10" fill="#334155">• UserRepository  — findByUsername/Email (normalized, case-insensitive)</text>
  <text x="756" y="594" font-size="10" fill="#334155">• StockMovementRepository · ReviewRepository · VerificationCodeRepository</text>
  <text x="756" y="611" font-size="10" fill="#334155">  Spring Security · JWT Filter · BCryptPasswordEncoder · LlmConfig (Gemini bean)</text>

  <!-- MODELS BACK -->
  <rect x="740" y="630" width="510" height="124" rx="8" fill="#fff" stroke="#bbf7d0" stroke-width="1.2"/>
  <text x="995" y="649" text-anchor="middle" font-size="11" font-weight="bold" fill="#15803d">MODÈLES  (@Entity JPA / Hibernate)</text>
  <text x="756" y="668" font-size="10" fill="#334155">• Book (status: ACTIVE|OUT_OF_STOCK|DISCONTINUED|COMING_SOON, finalPrice, featured, discount)</text>
  <text x="756" y="685" font-size="10" fill="#334155">• User (role: CLIENT|ADMIN, addresses[], email unique, password @JsonIgnore)</text>
  <text x="756" y="702" font-size="10" fill="#334155">• Order (trackingNumber, COD, ZoneId Paris) · OrderItem · Review</text>
  <text x="756" y="719" font-size="10" fill="#334155">• StockMovement (RESTOCK|SALE|RETURN|CORRECTION|LOSS|INITIAL, audit complet)</text>
  <text x="756" y="736" font-size="10" fill="#334155">• VerificationCode (code 6 chiffres, type, expiresAt 15min, used)</text>
  <text x="756" y="753" font-size="10" fill="#334155">  ddl-auto=update · open-in-view=false · FetchType.EAGER · @PrePersist</text>

  <!-- ══ DATABASE ══ -->
  <rect x="390" y="788" width="520" height="100" rx="14" fill="#faf5ff" stroke="#7c3aed" stroke-width="2"/>
  <rect x="390" y="788" width="520" height="32" rx="14" fill="#6d28d9"/>
  <rect x="390" y="806" width="520" height="14" fill="#6d28d9"/>
  <text x="650" y="809" text-anchor="middle" font-size="13" font-weight="bold" fill="#fff">MySQL 8 — bookstore_db</text>
  <text x="650" y="838" text-anchor="middle" font-size="10" fill="#5b21b6">book · orders · order_item · users · review · stock_movements · verification_codes</text>
  <text x="650" y="854" text-anchor="middle" font-size="10" fill="#5b21b6">book_author · user_addresses</text>
  <text x="650" y="870" text-anchor="middle" font-size="10" fill="#7c3aed">Docker Compose · Port 3306 · utf8mb4_unicode_ci · ddl-auto=update</text>

  <!-- External Left -->
  <rect x="30" y="792" width="325" height="96" rx="10" fill="#fffbeb" stroke="#d97706" stroke-width="1.5"/>
  <text x="192" y="812" text-anchor="middle" font-size="11" font-weight="bold" fill="#92400e">Services Externes</text>
  <text x="192" y="830" text-anchor="middle" font-size="10" fill="#78350f">✉  SMTP Gmail — confirm. + statut + vérification</text>
  <text x="192" y="847" text-anchor="middle" font-size="10" fill="#78350f">🤖  Google Gemini AI (LangChain4j) — chatbot + résumés</text>
  <text x="192" y="864" text-anchor="middle" font-size="10" fill="#78350f">📦  Chronopost — suivi colis N° CP…FR</text>

  <!-- External Right -->
  <rect x="945" y="792" width="325" height="96" rx="10" fill="#fffbeb" stroke="#d97706" stroke-width="1.5"/>
  <text x="1107" y="812" text-anchor="middle" font-size="11" font-weight="bold" fill="#92400e">Infrastructure &amp; Sécurité</text>
  <text x="1107" y="830" text-anchor="middle" font-size="10" fill="#78350f">🐳  Docker · Port 8080 (API) · 4200 (Front)</text>
  <text x="1107" y="847" text-anchor="middle" font-size="10" fill="#78350f">🔐  JWT Bearer · .env Spring-dotenv</text>
  <text x="1107" y="864" text-anchor="middle" font-size="10" fill="#78350f">🛡  CORS · ROLE_CLIENT / ROLE_ADMIN · @PreAuthorize</text>

  <!-- Arrows -->
  <line x1="580" y1="422" x2="720" y2="422" stroke="#2563eb" stroke-width="2" marker-end="url(#arr-blue)" stroke-dasharray="6,3"/>
  <text x="650" y="413" text-anchor="middle" font-size="9" fill="#1d4ed8">HTTP REST · JSON</text>
  <text x="650" y="426" text-anchor="middle" font-size="9" fill="#1d4ed8">Authorization: Bearer JWT</text>
  <line x1="995" y1="766" x2="840" y2="788" stroke="#7c3aed" stroke-width="1.8" marker-end="url(#arr-purple)"/>
  <text x="940" y="781" font-size="9" fill="#6d28d9">JPA/Hibernate</text>
  <line x1="305" y1="766" x2="450" y2="788" stroke="#7c3aed80" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arr-purple)"/>
  <line x1="995" y1="766" x2="1050" y2="792" stroke="#d9770680" stroke-width="1.2" stroke-dasharray="4,3"/>
  <line x1="192" y1="766" x2="192" y2="792" stroke="#d9770680" stroke-width="1.2" stroke-dasharray="4,3"/>
</svg>
