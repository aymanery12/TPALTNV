<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 840" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="arr-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#2563eb"/></marker>
    <marker id="arr-purple" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#7c3aed"/></marker>
  </defs>

  <rect width="1200" height="840" fill="#f8fafc"/>

  <!-- Title -->
  <text x="600" y="36" text-anchor="middle" font-size="20" font-weight="bold" fill="#0f172a">Architecture MVC — BookStore App</text>
  <text x="600" y="56" text-anchor="middle" font-size="12" fill="#64748b">Angular 21 · Spring Boot 3.2 · MySQL 8 · Gemini AI</text>
  <line x1="60" y1="66" x2="1140" y2="66" stroke="#cbd5e1" stroke-width="1.5"/>

  <!-- ══ FRONTEND ══ -->
  <rect x="30" y="78" width="500" height="620" rx="14" fill="#eff6ff" stroke="#3b82f6" stroke-width="2"/>
  <rect x="30" y="78" width="500" height="34" rx="14" fill="#2563eb"/>
  <rect x="30" y="98" width="500" height="14" fill="#2563eb"/>
  <text x="280" y="100" text-anchor="middle" font-size="13" font-weight="bold" fill="#fff">FRONTEND — Angular 21</text>

  <!-- VUE -->
  <rect x="50" y="124" width="460" height="158" rx="8" fill="#fff" stroke="#bfdbfe" stroke-width="1.2"/>
  <text x="280" y="143" text-anchor="middle" font-size="11" font-weight="bold" fill="#1d4ed8">VUE  (Templates HTML + Tailwind CSS)</text>
  <text x="66" y="162" font-size="10" fill="#475569">• home-page · catalog · book-details · cart · checkout</text>
  <text x="66" y="179" font-size="10" fill="#475569">• orders-page · tracking-page · user-profile</text>
  <text x="66" y="196" font-size="10" fill="#475569">• admin-dashboard (HTML + SCSS, light/dark mode)</text>
  <text x="66" y="213" font-size="10" fill="#475569">• navbar · footer · sidebar-filters · custom-dropdown</text>
  <text x="66" y="230" font-size="10" fill="#475569">• chatbot (Gemini AI — bouton flottant, historique)</text>
  <text x="66" y="247" font-size="10" fill="#475569">• book-card · book-grid · hero-promo · loader · rating</text>
  <text x="66" y="264" font-size="10" fill="#475569">• Stepper suivi commande · Chronopost tracking block</text>
  <text x="66" y="278" font-size="10" fill="#64748b">  Dark/Light mode (ThemeService) · i18n FR/EN (LanguageService)</text>

  <!-- CONTROLLER -->
  <rect x="50" y="294" width="460" height="120" rx="8" fill="#fff" stroke="#bfdbfe" stroke-width="1.2"/>
  <text x="280" y="313" text-anchor="middle" font-size="11" font-weight="bold" fill="#1d4ed8">CONTRÔLEUR  (Component TypeScript)</text>
  <text x="66" y="332" font-size="10" fill="#475569">• HomePageComponent · CatalogComponent · BookDetailsComponent</text>
  <text x="66" y="349" font-size="10" fill="#475569">• CartComponent · CheckoutComponent · TrackingPageComponent</text>
  <text x="66" y="366" font-size="10" fill="#475569">• OrdersPageComponent · UserProfileComponent · ChatbotComponent</text>
  <text x="66" y="383" font-size="10" fill="#475569">• AdminDashboardComponent · AuthGuard · RoleGuard</text>
  <text x="66" y="400" font-size="10" fill="#475569">• Angular Router · ReactiveFormsModule · ChangeDetectorRef · NgZone</text>

  <!-- SERVICES -->
  <rect x="50" y="426" width="460" height="136" rx="8" fill="#fff" stroke="#bfdbfe" stroke-width="1.2"/>
  <text x="280" y="445" text-anchor="middle" font-size="11" font-weight="bold" fill="#1d4ed8">SERVICES  (Couche données Frontend)</text>
  <text x="66" y="464" font-size="10" fill="#475569">• AuthService — JWT login / register / localStorage</text>
  <text x="66" y="481" font-size="10" fill="#475569">• OrderService — getMyOrders · getOrderById · createOrder</text>
  <text x="66" y="498" font-size="10" fill="#475569">• BookService — getBooks · getBestSellers · getBookById</text>
  <text x="66" y="515" font-size="10" fill="#475569">• CartService — localStorage · BehaviorSubject panier</text>
  <text x="66" y="532" font-size="10" fill="#475569">• ChatService — POST /api/chat (Gemini)</text>
  <text x="66" y="549" font-size="10" fill="#475569">• LanguageService (FR/EN) · ThemeService (dark/light)</text>
  <text x="66" y="566" font-size="10" fill="#475569">• HttpClient + JWT interceptor (Authorization: Bearer)</text>

  <!-- MODELS FRONT -->
  <rect x="50" y="574" width="460" height="112" rx="8" fill="#fff" stroke="#bfdbfe" stroke-width="1.2"/>
  <text x="280" y="593" text-anchor="middle" font-size="11" font-weight="bold" fill="#1d4ed8">MODÈLES  (Interfaces TypeScript)</text>
  <text x="66" y="612" font-size="10" fill="#475569">• Order { id, status, totalAmount, trackingNumber, items… }</text>
  <text x="66" y="629" font-size="10" fill="#475569">• Book { id, title, author[], price, finalPrice, rating… }</text>
  <text x="66" y="646" font-size="10" fill="#475569">• OrderItem · User · Review · BestSellerBook</text>
  <text x="66" y="663" font-size="10" fill="#475569">• ChatMessage { role: 'user' | 'bot', text }</text>

  <!-- ══ BACKEND ══ -->
  <rect x="670" y="78" width="500" height="620" rx="14" fill="#f0fdf4" stroke="#16a34a" stroke-width="2"/>
  <rect x="670" y="78" width="500" height="34" rx="14" fill="#15803d"/>
  <rect x="670" y="98" width="500" height="14" fill="#15803d"/>
  <text x="920" y="100" text-anchor="middle" font-size="13" font-weight="bold" fill="#fff">BACKEND — Spring Boot 3.2</text>

  <!-- CONTROLLERS BACK -->
  <rect x="690" y="124" width="460" height="156" rx="8" fill="#fff" stroke="#bbf7d0" stroke-width="1.2"/>
  <text x="920" y="143" text-anchor="middle" font-size="11" font-weight="bold" fill="#15803d">CONTRÔLEUR  (@RestController)</text>
  <text x="706" y="162" font-size="10" fill="#475569">• BookController        GET/POST/PUT/DELETE /api/books</text>
  <text x="706" y="179" font-size="10" fill="#475569">• OrderController       POST /api/orders · GET /orders/my · GET /orders/{id}</text>
  <text x="706" y="196" font-size="10" fill="#475569">• AdminController       /api/admin/** (ROLE_ADMIN)</text>
  <text x="706" y="213" font-size="10" fill="#475569">• AuthController        /api/auth/login · /register</text>
  <text x="706" y="230" font-size="10" fill="#475569">• ChatController        POST /api/chat  (Gemini AI LangChain4j)</text>
  <text x="706" y="247" font-size="10" fill="#475569">• RecommendationController  GET /api/recommendations</text>
  <text x="706" y="264" font-size="10" fill="#475569">• ReviewController · ReviewStatsController · HelloController</text>

  <!-- SERVICES BACK -->
  <rect x="690" y="292" width="460" height="136" rx="8" fill="#fff" stroke="#bbf7d0" stroke-width="1.2"/>
  <text x="920" y="311" text-anchor="middle" font-size="11" font-weight="bold" fill="#15803d">SERVICE  (@Service + @Transactional)</text>
  <text x="706" y="330" font-size="10" fill="#475569">• OrderService  — createOrder, getOrderById, updateStatus</text>
  <text x="706" y="347" font-size="10" fill="#475569">  → décrémente stock · crée StockMovement · envoie email</text>
  <text x="706" y="364" font-size="10" fill="#475569">  → @Transactional(readOnly=true) + init @ElementCollection</text>
  <text x="706" y="381" font-size="10" fill="#475569">• EmailService  — sendOrderConfirmation, sendStatusUpdate</text>
  <text x="706" y="398" font-size="10" fill="#475569">  → HTML email · Chronopost block si statut = EXPEDIEE</text>
  <text x="706" y="415" font-size="10" fill="#475569">• N° Chronopost : CP{orderId}{random}FR (auto à l'expédition)</text>

  <!-- REPOSITORIES -->
  <rect x="690" y="440" width="460" height="116" rx="8" fill="#fff" stroke="#bbf7d0" stroke-width="1.2"/>
  <text x="920" y="459" text-anchor="middle" font-size="11" font-weight="bold" fill="#15803d">REPOSITORY  (JpaRepository + @Query)</text>
  <text x="706" y="478" font-size="10" fill="#475569">• BookRepository  · OrderRepository  · UserRepository</text>
  <text x="706" y="495" font-size="10" fill="#475569">• ReviewRepository  · StockMovementRepository</text>
  <text x="706" y="512" font-size="10" fill="#475569">• @Query natives · decrementStock(bookId, qty)</text>
  <text x="706" y="529" font-size="10" fill="#475569">• findAdminOrderSummaries (tracking_number incl.)</text>
  <text x="706" y="546" font-size="10" fill="#475569">• Spring Security · JWT Filter · BCryptPasswordEncoder</text>

  <!-- MODELS BACK -->
  <rect x="690" y="568" width="460" height="118" rx="8" fill="#fff" stroke="#bbf7d0" stroke-width="1.2"/>
  <text x="920" y="587" text-anchor="middle" font-size="11" font-weight="bold" fill="#15803d">MODÈLES  (@Entity JPA / Hibernate)</text>
  <text x="706" y="606" font-size="10" fill="#475569">• Book (title, author[], price, quantity, soldCount, status…)</text>
  <text x="706" y="623" font-size="10" fill="#475569">• User (username, email, role, addresses[])</text>
  <text x="706" y="640" font-size="10" fill="#475569">• Order (status, trackingNumber, totalAmount, items)</text>
  <text x="706" y="657" font-size="10" fill="#475569">• OrderItem · Review · StockMovement · VerificationCode</text>
  <text x="706" y="674" font-size="10" fill="#475569">• ddl-auto=update · open-in-view=false · ZoneId Paris</text>

  <!-- ══ DATABASE ══ -->
  <rect x="350" y="722" width="500" height="100" rx="14" fill="#faf5ff" stroke="#7c3aed" stroke-width="2"/>
  <rect x="350" y="722" width="500" height="32" rx="14" fill="#6d28d9"/>
  <rect x="350" y="740" width="500" height="14" fill="#6d28d9"/>
  <text x="600" y="743" text-anchor="middle" font-size="13" font-weight="bold" fill="#fff">MySQL 8 — bookstore_db</text>
  <text x="600" y="772" text-anchor="middle" font-size="10" fill="#5b21b6">book · orders · order_item · users · review · stock_movements</text>
  <text x="600" y="788" text-anchor="middle" font-size="10" fill="#5b21b6">book_author · user_addresses · verification_codes</text>
  <text x="600" y="804" text-anchor="middle" font-size="10" fill="#7c3aed">Docker Compose · Port 3306 · utf8mb4_unicode_ci</text>

  <!-- External Left -->
  <rect x="30" y="728" width="285" height="94" rx="10" fill="#fffbeb" stroke="#d97706" stroke-width="1.5"/>
  <text x="172" y="748" text-anchor="middle" font-size="11" font-weight="bold" fill="#92400e">Services Externes</text>
  <text x="172" y="766" text-anchor="middle" font-size="10" fill="#78350f">✉  SMTP Gmail — email confirmation + statut</text>
  <text x="172" y="782" text-anchor="middle" font-size="10" fill="#78350f">🤖  Gemini AI (LangChain4j) — chatbot</text>
  <text x="172" y="798" text-anchor="middle" font-size="10" fill="#78350f">📦  Chronopost — suivi colis N° CP…FR</text>

  <!-- External Right -->
  <rect x="885" y="728" width="285" height="94" rx="10" fill="#fffbeb" stroke="#d97706" stroke-width="1.5"/>
  <text x="1027" y="748" text-anchor="middle" font-size="11" font-weight="bold" fill="#92400e">Infrastructure &amp; Sécurité</text>
  <text x="1027" y="766" text-anchor="middle" font-size="10" fill="#78350f">🐳  Docker · Port 8080 (API) · 4200 (Front)</text>
  <text x="1027" y="782" text-anchor="middle" font-size="10" fill="#78350f">🔐  JWT Bearer · .env Spring-dotenv</text>
  <text x="1027" y="798" text-anchor="middle" font-size="10" fill="#78350f">🛡  CORS · ROLE_USER / ROLE_ADMIN</text>

  <!-- Arrows -->
  <line x1="530" y1="388" x2="670" y2="388" stroke="#2563eb" stroke-width="2" marker-end="url(#arr-blue)" stroke-dasharray="6,3"/>
  <text x="600" y="379" text-anchor="middle" font-size="9" fill="#1d4ed8">HTTP REST · JSON</text>
  <text x="600" y="392" text-anchor="middle" font-size="9" fill="#1d4ed8">Authorization: Bearer JWT</text>
  <line x1="920" y1="698" x2="770" y2="722" stroke="#7c3aed" stroke-width="1.8" marker-end="url(#arr-purple)"/>
  <text x="876" y="714" font-size="9" fill="#6d28d9">JPA/Hibernate</text>
  <line x1="280" y1="698" x2="410" y2="722" stroke="#7c3aed80" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arr-purple)"/>
  <line x1="920" y1="698" x2="960" y2="728" stroke="#d9770680" stroke-width="1.2" stroke-dasharray="4,3"/>
  <line x1="172" y1="698" x2="172" y2="728" stroke="#d9770680" stroke-width="1.2" stroke-dasharray="4,3"/>
</svg>
