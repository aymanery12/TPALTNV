<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 780" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="arr-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#3b82f6"/></marker>
    <marker id="arr-purple" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#8b5cf6"/></marker>
  </defs>
  <rect width="1100" height="780" fill="#0f1117"/>
  <text x="550" y="36" text-anchor="middle" font-size="20" font-weight="bold" fill="#f1f5f9">Architecture MVC — BookStore App</text>
  <text x="550" y="56" text-anchor="middle" font-size="12" fill="#64748b">Angular 21 (Frontend)  ·  Spring Boot 3.2 (Backend)  ·  MySQL 8</text>
  <line x1="80" y1="66" x2="1020" y2="66" stroke="#ffffff15" stroke-width="1"/>

  <!-- FRONTEND -->
  <rect x="30" y="80" width="470" height="548" rx="14" fill="#1e293b" stroke="#3b82f6" stroke-width="1.5"/>
  <rect x="30" y="80" width="470" height="34" rx="14" fill="#1d4ed8"/>
  <rect x="30" y="100" width="470" height="14" fill="#1d4ed8"/>
  <text x="265" y="102" text-anchor="middle" font-size="13" font-weight="bold" fill="#fff">FRONTEND — Angular 21</text>
  <rect x="50" y="126" width="430" height="148" rx="8" fill="#0f172a" stroke="#3b82f640" stroke-width="1"/>
  <text x="265" y="145" text-anchor="middle" font-size="11" font-weight="bold" fill="#93c5fd">VUE  (Templates HTML + Tailwind CSS)</text>
  <text x="66" y="164" font-size="10" fill="#94a3b8">• home-page · catalog · book-details · cart · checkout</text>
  <text x="66" y="181" font-size="10" fill="#94a3b8">• orders-page · tracking-page · user-profile</text>
  <text x="66" y="198" font-size="10" fill="#94a3b8">• admin-dashboard (HTML + SCSS light/dark)</text>
  <text x="66" y="215" font-size="10" fill="#94a3b8">• navbar · footer · sidebar-filters · custom-dropdown</text>
  <text x="66" y="232" font-size="10" fill="#94a3b8">• Dark/Light mode — ThemeService + Tailwind dark:</text>
  <text x="66" y="249" font-size="10" fill="#94a3b8">• i18n FR/EN — LanguageService (t('key'))</text>
  <text x="66" y="266" font-size="10" fill="#94a3b8">• Stepper suivi commande · Chronopost tracking block</text>
  <rect x="50" y="286" width="430" height="120" rx="8" fill="#0f172a" stroke="#3b82f640" stroke-width="1"/>
  <text x="265" y="305" text-anchor="middle" font-size="11" font-weight="bold" fill="#93c5fd">CONTRÔLEUR  (Component TypeScript)</text>
  <text x="66" y="324" font-size="10" fill="#94a3b8">• HomePageComponent · CatalogComponent · BookDetailsComponent</text>
  <text x="66" y="341" font-size="10" fill="#94a3b8">• CartComponent · CheckoutComponent · TrackingPageComponent</text>
  <text x="66" y="358" font-size="10" fill="#94a3b8">• OrdersPageComponent · UserProfileComponent</text>
  <text x="66" y="375" font-size="10" fill="#94a3b8">• AdminDashboardComponent · AuthGuard · RoleGuard</text>
  <text x="66" y="392" font-size="10" fill="#94a3b8">• Angular Router · ReactiveFormsModule · ChangeDetectorRef</text>
  <rect x="50" y="418" width="430" height="116" rx="8" fill="#0f172a" stroke="#3b82f640" stroke-width="1"/>
  <text x="265" y="437" text-anchor="middle" font-size="11" font-weight="bold" fill="#93c5fd">SERVICES  (Couche données Frontend)</text>
  <text x="66" y="456" font-size="10" fill="#94a3b8">• AuthService — JWT login / register / storage</text>
  <text x="66" y="473" font-size="10" fill="#94a3b8">• OrderService — getMyOrders · getOrderById · createOrder</text>
  <text x="66" y="490" font-size="10" fill="#94a3b8">• CartService — localStorage · BehaviorSubject panier</text>
  <text x="66" y="507" font-size="10" fill="#94a3b8">• LanguageService (FR/EN) · ThemeService (dark/light)</text>
  <text x="66" y="524" font-size="10" fill="#94a3b8">• HttpClient + JWT interceptor (Authorization: Bearer)</text>
  <rect x="50" y="546" width="430" height="70" rx="8" fill="#0f172a" stroke="#3b82f640" stroke-width="1"/>
  <text x="265" y="565" text-anchor="middle" font-size="11" font-weight="bold" fill="#93c5fd">MODÈLES  (Interfaces TypeScript)</text>
  <text x="265" y="583" text-anchor="middle" font-size="10" fill="#94a3b8">Order · OrderItem · Book · User · Review</text>
  <text x="265" y="600" text-anchor="middle" font-size="10" fill="#94a3b8">trackingNumber? · shippingAddress · totalAmount</text>

  <!-- BACKEND -->
  <rect x="600" y="80" width="470" height="548" rx="14" fill="#1a2e1e" stroke="#10b981" stroke-width="1.5"/>
  <rect x="600" y="80" width="470" height="34" rx="14" fill="#065f46"/>
  <rect x="600" y="100" width="470" height="14" fill="#065f46"/>
  <text x="835" y="102" text-anchor="middle" font-size="13" font-weight="bold" fill="#fff">BACKEND — Spring Boot 3.2</text>
  <rect x="620" y="126" width="430" height="130" rx="8" fill="#0a1f0e" stroke="#10b98140" stroke-width="1"/>
  <text x="835" y="145" text-anchor="middle" font-size="11" font-weight="bold" fill="#6ee7b7">CONTRÔLEUR  (@RestController)</text>
  <text x="636" y="164" font-size="10" fill="#94a3b8">• BookController     GET/POST/PUT/DELETE /api/books</text>
  <text x="636" y="181" font-size="10" fill="#94a3b8">• OrderController    POST /api/orders · GET /orders/my</text>
  <text x="636" y="198" font-size="10" fill="#94a3b8">• AdminController    /api/admin/** (ROLE_ADMIN)</text>
  <text x="636" y="215" font-size="10" fill="#94a3b8">• AuthController     /api/auth/login · /register</text>
  <text x="636" y="232" font-size="10" fill="#94a3b8">• ReviewController · ChatController · RecommendationController</text>
  <text x="636" y="249" font-size="10" fill="#94a3b8">• CORS · @CrossOrigin · Spring Security filter chain</text>
  <rect x="620" y="268" width="430" height="120" rx="8" fill="#0a1f0e" stroke="#10b98140" stroke-width="1"/>
  <text x="835" y="287" text-anchor="middle" font-size="11" font-weight="bold" fill="#6ee7b7">SERVICE  (@Service + @Transactional)</text>
  <text x="636" y="306" font-size="10" fill="#94a3b8">• OrderService — createOrder, getOrderById, updateStatus</text>
  <text x="636" y="323" font-size="10" fill="#94a3b8">  → décrémente stock · crée StockMovement · envoie email</text>
  <text x="636" y="340" font-size="10" fill="#94a3b8">• EmailService — sendOrderConfirmation, sendStatusUpdate</text>
  <text x="636" y="357" font-size="10" fill="#94a3b8">  → HTML email · Chronopost block si statut = EXPEDIEE</text>
  <text x="636" y="374" font-size="10" fill="#94a3b8">• Génération N° Chronopost : CP{orderId}{random}FR</text>
  <rect x="620" y="400" width="430" height="100" rx="8" fill="#0a1f0e" stroke="#10b98140" stroke-width="1"/>
  <text x="835" y="419" text-anchor="middle" font-size="11" font-weight="bold" fill="#6ee7b7">REPOSITORY  (JpaRepository)</text>
  <text x="636" y="438" font-size="10" fill="#94a3b8">• BookRepository · OrderRepository · UserRepository</text>
  <text x="636" y="455" font-size="10" fill="#94a3b8">• ReviewRepository · StockMovementRepository</text>
  <text x="636" y="472" font-size="10" fill="#94a3b8">• @Query natives · decrementStock(bookId, qty)</text>
  <text x="636" y="489" font-size="10" fill="#94a3b8">• Spring Security · JWT Filter · BCryptPasswordEncoder</text>
  <rect x="620" y="512" width="430" height="104" rx="8" fill="#0a1f0e" stroke="#10b98140" stroke-width="1"/>
  <text x="835" y="531" text-anchor="middle" font-size="11" font-weight="bold" fill="#6ee7b7">MODÈLES  (@Entity JPA / Hibernate)</text>
  <text x="636" y="550" font-size="10" fill="#94a3b8">• Book · User · Order (trackingNumber) · OrderItem</text>
  <text x="636" y="567" font-size="10" fill="#94a3b8">• Review · StockMovement (SALE/RESTOCK/CORRECTION…)</text>
  <text x="636" y="584" font-size="10" fill="#94a3b8">• ddl-auto=update · open-in-view=false · FetchType.EAGER</text>
  <text x="636" y="601" font-size="10" fill="#94a3b8">• @Transactional(readOnly=true) + force init ElementCollection</text>

  <!-- DATABASE -->
  <rect x="330" y="652" width="440" height="100" rx="14" fill="#1e1b2e" stroke="#8b5cf6" stroke-width="1.5"/>
  <rect x="330" y="652" width="440" height="32" rx="14" fill="#4c1d95"/>
  <rect x="330" y="670" width="440" height="14" fill="#4c1d95"/>
  <text x="550" y="673" text-anchor="middle" font-size="13" font-weight="bold" fill="#fff">MySQL 8 — bookstore_db</text>
  <text x="550" y="702" text-anchor="middle" font-size="10" fill="#c4b5fd">book · orders · order_item · users · review · stock_movements</text>
  <text x="550" y="718" text-anchor="middle" font-size="10" fill="#c4b5fd">book_author · user_addresses · verification_codes</text>
  <text x="550" y="734" text-anchor="middle" font-size="10" fill="#7c3aed">Docker Compose · Port 3306 · utf8mb4_unicode_ci</text>

  <!-- External Services -->
  <rect x="30" y="660" width="260" height="82" rx="10" fill="#1c1a10" stroke="#f59e0b" stroke-width="1.2"/>
  <text x="160" y="679" text-anchor="middle" font-size="11" font-weight="bold" fill="#fbbf24">Services Externes</text>
  <text x="160" y="697" text-anchor="middle" font-size="10" fill="#94a3b8">✉  SMTP Gmail — confirmation + statut commande</text>
  <text x="160" y="713" text-anchor="middle" font-size="10" fill="#94a3b8">📦  Chronopost — suivi colis N° CP…FR</text>
  <text x="160" y="729" text-anchor="middle" font-size="10" fill="#94a3b8">🤖  IA — recommandations livres</text>
  <rect x="810" y="660" width="260" height="82" rx="10" fill="#1c1a10" stroke="#f59e0b" stroke-width="1.2"/>
  <text x="940" y="679" text-anchor="middle" font-size="11" font-weight="bold" fill="#fbbf24">Infrastructure</text>
  <text x="940" y="697" text-anchor="middle" font-size="10" fill="#94a3b8">🐳  Docker · Port 8080 (API) · 4200 (Front)</text>
  <text x="940" y="713" text-anchor="middle" font-size="10" fill="#94a3b8">🔐  JWT Bearer · .env Spring-dotenv</text>
  <text x="940" y="729" text-anchor="middle" font-size="10" fill="#94a3b8">🛡  CORS · ROLE_USER / ROLE_ADMIN</text>

  <!-- Arrows -->
  <line x1="500" y1="354" x2="600" y2="354" stroke="#3b82f6" stroke-width="2" marker-end="url(#arr-blue)" stroke-dasharray="6,3"/>
  <text x="550" y="345" text-anchor="middle" font-size="9" fill="#60a5fa">HTTP REST · JSON</text>
  <text x="550" y="357" text-anchor="middle" font-size="9" fill="#60a5fa">Authorization: Bearer JWT</text>
  <line x1="835" y1="628" x2="700" y2="652" stroke="#8b5cf6" stroke-width="1.5" marker-end="url(#arr-purple)"/>
  <text x="792" y="643" font-size="9" fill="#a78bfa">JPA/Hibernate</text>
  <line x1="265" y1="628" x2="382" y2="652" stroke="#8b5cf660" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arr-purple)"/>
</svg>
