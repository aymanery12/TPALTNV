<svg width="960" height="620" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#64748b"/>
    </marker>
    <marker id="arr-blue" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#3b82f6"/>
    </marker>
    <marker id="arr-orange" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#ea580c"/>
    </marker>
    <marker id="arr-yellow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#d97706"/>
    </marker>
    <marker id="arr-red" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#dc2626"/>
    </marker>
    <marker id="arr-purple" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#9333ea"/>
    </marker>
  </defs>

  <!-- Fond -->
  <rect width="960" height="620" fill="#f1f5f9" rx="10"/>

  <!-- Titre -->
  <text x="480" y="32" text-anchor="middle" font-size="19" font-weight="bold" fill="#0f172a">Architecture Globale — BookStore IA</text>

  <!-- ── Docker Compose ── -->
  <rect x="15" y="50" width="710" height="550" rx="10" fill="white" stroke="#94a3b8" stroke-width="2" stroke-dasharray="8,4"/>
  <rect x="25" y="44" width="155" height="18" fill="#f1f5f9"/>
  <text x="102" y="57" text-anchor="middle" font-size="12" fill="#64748b" font-weight="bold">🐳 Docker Compose</text>

  <!-- ── Angular ── -->
  <rect x="35" y="75" width="200" height="220" rx="8" fill="#eff6ff" stroke="#3b82f6" stroke-width="2"/>
  <line x1="35" y1="103" x2="235" y2="103" stroke="#3b82f6" stroke-width="2"/>
  <text x="135" y="94" text-anchor="middle" font-size="13" font-weight="bold" fill="#1d4ed8">Angular 21</text>
  <text x="135" y="122" text-anchor="middle" font-size="11" fill="#1e40af" font-weight="bold">Frontend</text>
  <text x="55" y="145" font-size="11" fill="#374151">• Components (NgModules)</text>
  <text x="55" y="163" font-size="11" fill="#374151">• Services HTTP</text>
  <text x="55" y="181" font-size="11" fill="#374151">• Guards (Auth)</text>
  <text x="55" y="199" font-size="11" fill="#374151">• Interceptors JWT</text>
  <text x="55" y="217" font-size="11" fill="#374151">• Lazy Loading Routes</text>
  <text x="135" y="282" text-anchor="middle" font-size="11" fill="#64748b">🌐 localhost:4200</text>

  <!-- ── Spring Boot ── -->
  <rect x="295" y="62" width="250" height="335" rx="8" fill="#f0fdf4" stroke="#16a34a" stroke-width="2"/>
  <line x1="295" y1="90" x2="545" y2="90" stroke="#16a34a" stroke-width="2"/>
  <text x="420" y="81" text-anchor="middle" font-size="13" font-weight="bold" fill="#15803d">Spring Boot 3.2</text>

  <rect x="310" y="100" width="220" height="48" rx="5" fill="#dcfce7" stroke="#86efac" stroke-width="1"/>
  <text x="420" y="119" text-anchor="middle" font-size="11" fill="#14532d" font-weight="bold">Controllers (REST API)</text>
  <text x="420" y="138" text-anchor="middle" font-size="10" fill="#166534">Auth · Book · Order · Admin · Chat</text>

  <rect x="310" y="155" width="220" height="48" rx="5" fill="#dcfce7" stroke="#86efac" stroke-width="1"/>
  <text x="420" y="174" text-anchor="middle" font-size="11" fill="#14532d" font-weight="bold">Services (Business Logic)</text>
  <text x="420" y="193" text-anchor="middle" font-size="10" fill="#166534">Order · Email · Gemini · Stock</text>

  <rect x="310" y="210" width="220" height="48" rx="5" fill="#dcfce7" stroke="#86efac" stroke-width="1"/>
  <text x="420" y="229" text-anchor="middle" font-size="11" fill="#14532d" font-weight="bold">Security / JWT</text>
  <text x="420" y="248" text-anchor="middle" font-size="10" fill="#166534">JwtFilter · JwtUtil · SecurityConfig</text>

  <rect x="310" y="265" width="220" height="48" rx="5" fill="#dcfce7" stroke="#86efac" stroke-width="1"/>
  <text x="420" y="284" text-anchor="middle" font-size="11" fill="#14532d" font-weight="bold">Repositories (JPA)</text>
  <text x="420" y="303" text-anchor="middle" font-size="10" fill="#166534">Book · User · Order · Review</text>

  <rect x="310" y="320" width="220" height="48" rx="5" fill="#dcfce7" stroke="#86efac" stroke-width="1"/>
  <text x="420" y="339" text-anchor="middle" font-size="11" fill="#14532d" font-weight="bold">LangChain4j (Gemini)</text>
  <text x="420" y="358" text-anchor="middle" font-size="10" fill="#166534">ChatModel · RecommendationService</text>

  <text x="420" y="382" text-anchor="middle" font-size="11" fill="#64748b">🚀 localhost:8080</text>

  <!-- ── MySQL ── -->
  <rect x="295" y="445" width="250" height="130" rx="8" fill="#fff7ed" stroke="#ea580c" stroke-width="2"/>
  <line x1="295" y1="473" x2="545" y2="473" stroke="#ea580c" stroke-width="2"/>
  <text x="420" y="464" text-anchor="middle" font-size="13" font-weight="bold" fill="#c2410c">MySQL 8.0</text>
  <text x="420" y="493" text-anchor="middle" font-size="11" fill="#374151" font-weight="bold">Base de données</text>
  <text x="420" y="513" text-anchor="middle" font-size="11" fill="#374151">bookstore_db</text>
  <text x="420" y="533" text-anchor="middle" font-size="11" fill="#64748b">🗄️ localhost:3306</text>
  <text x="420" y="552" text-anchor="middle" font-size="10" fill="#9ca3af">Initialisée via bookstore_db.sql</text>

  <!-- ── phpMyAdmin ── -->
  <rect x="35" y="370" width="200" height="110" rx="8" fill="#fdf4ff" stroke="#9333ea" stroke-width="2"/>
  <line x1="35" y1="398" x2="235" y2="398" stroke="#9333ea" stroke-width="2"/>
  <text x="135" y="389" text-anchor="middle" font-size="13" font-weight="bold" fill="#7e22ce">phpMyAdmin</text>
  <text x="135" y="418" text-anchor="middle" font-size="11" fill="#374151">Interface admin base</text>
  <text x="135" y="458" text-anchor="middle" font-size="11" fill="#64748b">localhost:8081</text>

  <!-- ── Gemini API ── -->
  <rect x="750" y="80" width="185" height="130" rx="8" fill="#fefce8" stroke="#ca8a04" stroke-width="2"/>
  <line x1="750" y1="108" x2="935" y2="108" stroke="#ca8a04" stroke-width="2"/>
  <text x="837" y="99" text-anchor="middle" font-size="13" font-weight="bold" fill="#92400e">Google Gemini AI</text>
  <text x="837" y="128" text-anchor="middle" font-size="11" fill="#374151">Chatbot IA</text>
  <text x="837" y="147" text-anchor="middle" font-size="11" fill="#374151">Recommandations livres</text>
  <text x="837" y="166" text-anchor="middle" font-size="11" fill="#374151">Résumés automatiques</text>
  <text x="837" y="198" text-anchor="middle" font-size="10" fill="#64748b">☁️ API externe (HTTPS)</text>

  <!-- ── Gmail SMTP ── -->
  <rect x="750" y="255" width="185" height="130" rx="8" fill="#fef2f2" stroke="#dc2626" stroke-width="2"/>
  <line x1="750" y1="283" x2="935" y2="283" stroke="#dc2626" stroke-width="2"/>
  <text x="837" y="274" text-anchor="middle" font-size="13" font-weight="bold" fill="#991b1b">Gmail SMTP</text>
  <text x="837" y="303" text-anchor="middle" font-size="11" fill="#374151">Emails transactionnels</text>
  <text x="837" y="322" text-anchor="middle" font-size="11" fill="#374151">Codes de vérification</text>
  <text x="837" y="341" text-anchor="middle" font-size="11" fill="#374151">smtp.gmail.com:587</text>
  <text x="837" y="374" text-anchor="middle" font-size="10" fill="#64748b">☁️ Service externe (STARTTLS)</text>

  <!-- ── Légende ── -->
  <rect x="750" y="430" width="185" height="165" rx="8" fill="white" stroke="#e2e8f0" stroke-width="1"/>
  <line x1="750" y1="452" x2="935" y2="452" stroke="#e2e8f0" stroke-width="1"/>
  <text x="837" y="446" text-anchor="middle" font-size="12" font-weight="bold" fill="#0f172a">Légende</text>
  <line x1="762" y1="471" x2="792" y2="471" stroke="#3b82f6" stroke-width="2" marker-end="url(#arr-blue)"/>
  <text x="800" y="475" font-size="10" fill="#374151">HTTP / REST</text>
  <line x1="762" y1="493" x2="792" y2="493" stroke="#ea580c" stroke-width="2" marker-end="url(#arr-orange)"/>
  <text x="800" y="497" font-size="10" fill="#374151">JDBC (Base données)</text>
  <line x1="762" y1="515" x2="792" y2="515" stroke="#d97706" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arr-yellow)"/>
  <text x="800" y="519" font-size="10" fill="#374151">API externe HTTPS</text>
  <line x1="762" y1="537" x2="792" y2="537" stroke="#dc2626" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arr-red)"/>
  <text x="800" y="541" font-size="10" fill="#374151">SMTP (emails)</text>
  <line x1="762" y1="559" x2="792" y2="559" stroke="#9333ea" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr-purple)"/>
  <text x="800" y="563" font-size="10" fill="#374151">Admin BDD</text>
  <line x1="762" y1="581" x2="792" y2="581" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="8,4"/>
  <text x="800" y="585" font-size="10" fill="#374151">Docker Compose</text>

  <!-- ── Flèches ── -->
  <!-- Angular ↔ Spring Boot -->
  <line x1="236" y1="188" x2="293" y2="188" stroke="#3b82f6" stroke-width="2" marker-end="url(#arr-blue)"/>
  <line x1="295" y1="204" x2="238" y2="204" stroke="#3b82f6" stroke-width="2" marker-end="url(#arr-blue)"/>
  <text x="264" y="181" text-anchor="middle" font-size="10" fill="#3b82f6">HTTP/REST</text>
  <text x="264" y="220" text-anchor="middle" font-size="10" fill="#3b82f6">+ JWT Token</text>

  <!-- Spring Boot → MySQL -->
  <line x1="420" y1="397" x2="420" y2="443" stroke="#ea580c" stroke-width="2" marker-end="url(#arr-orange)"/>
  <text x="438" y="424" font-size="10" fill="#ea580c">JDBC</text>

  <!-- phpMyAdmin → MySQL -->
  <polyline points="135,480 135,520 295,510" stroke="#9333ea" stroke-width="1.5" stroke-dasharray="5,3" fill="none" marker-end="url(#arr-purple)"/>

  <!-- Spring Boot → Gemini API -->
  <line x1="545" y1="160" x2="748" y2="160" stroke="#d97706" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#arr-yellow)"/>
  <text x="645" y="153" text-anchor="middle" font-size="10" fill="#d97706">HTTPS API</text>

  <!-- Spring Boot → Gmail SMTP -->
  <line x1="545" y1="280" x2="748" y2="320" stroke="#dc2626" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#arr-red)"/>
  <text x="652" y="295" text-anchor="middle" font-size="10" fill="#dc2626">STARTTLS</text>

</svg>
