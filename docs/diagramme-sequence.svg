<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1300 1200" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="arr"     markerWidth="10" markerHeight="7" refX="9"  refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#64748b"/></marker>
    <marker id="arr-ret" markerWidth="10" markerHeight="7" refX="1"  refY="3.5" orient="auto"><polygon points="10 0,0 3.5,10 7" fill="#64748b"/></marker>
    <marker id="arr-b"   markerWidth="10" markerHeight="7" refX="9"  refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#2563eb"/></marker>
    <marker id="arr-g"   markerWidth="10" markerHeight="7" refX="9"  refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#15803d"/></marker>
    <marker id="arr-a"   markerWidth="10" markerHeight="7" refX="9"  refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#b45309"/></marker>
    <marker id="arr-r"   markerWidth="10" markerHeight="7" refX="9"  refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#b91c1c"/></marker>
    <marker id="arr-p"   markerWidth="10" markerHeight="7" refX="9"  refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#6d28d9"/></marker>
    <marker id="arr-i"   markerWidth="10" markerHeight="7" refX="9"  refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#4338ca"/></marker>
  </defs>

  <rect width="1300" height="1200" fill="#f8fafc"/>
  <text x="650" y="36" text-anchor="middle" font-size="20" font-weight="bold" fill="#0f172a">Diagramme de Séquence — BookStore App</text>
  <text x="650" y="56" text-anchor="middle" font-size="12" fill="#64748b">Flux : Commande · Email · Chronopost · Chatbot Gemini AI · Auth inscription</text>
  <line x1="60" y1="66" x2="1240" y2="66" stroke="#cbd5e1" stroke-width="1.5"/>

  <!-- LIFELINE HEADERS -->
  <rect x="15"   y="78" width="120" height="44" rx="8" fill="#2563eb" stroke="#1d4ed8" stroke-width="1.5"/>
  <text x="75"   y="96"  text-anchor="middle" font-size="11" font-weight="bold" fill="#fff">Utilisateur</text>
  <text x="75"   y="112" text-anchor="middle" font-size="9"  fill="#bfdbfe">(Navigateur)</text>

  <rect x="168"  y="78" width="144" height="44" rx="8" fill="#15803d" stroke="#166534" stroke-width="1.5"/>
  <text x="240"  y="96"  text-anchor="middle" font-size="11" font-weight="bold" fill="#fff">Angular Frontend</text>
  <text x="240"  y="112" text-anchor="middle" font-size="9"  fill="#bbf7d0">Components + Services</text>

  <rect x="357"  y="78" width="146" height="44" rx="8" fill="#6d28d9" stroke="#5b21b6" stroke-width="1.5"/>
  <text x="430"  y="96"  text-anchor="middle" font-size="11" font-weight="bold" fill="#fff">OrderController</text>
  <text x="430"  y="112" text-anchor="middle" font-size="9"  fill="#ddd6fe">/api/orders</text>

  <rect x="547"  y="78" width="146" height="44" rx="8" fill="#b45309" stroke="#92400e" stroke-width="1.5"/>
  <text x="620"  y="96"  text-anchor="middle" font-size="11" font-weight="bold" fill="#fff">OrderService</text>
  <text x="620"  y="112" text-anchor="middle" font-size="9"  fill="#fde68a">@Transactional</text>

  <rect x="746"  y="78" width="148" height="44" rx="8" fill="#166534" stroke="#15803d" stroke-width="1.5"/>
  <text x="820"  y="96"  text-anchor="middle" font-size="11" font-weight="bold" fill="#fff">Repository / DB</text>
  <text x="820"  y="112" text-anchor="middle" font-size="9"  fill="#bbf7d0">JPA + MySQL</text>

  <rect x="937"  y="78" width="146" height="44" rx="8" fill="#b91c1c" stroke="#991b1b" stroke-width="1.5"/>
  <text x="1010" y="96"  text-anchor="middle" font-size="11" font-weight="bold" fill="#fff">EmailService</text>
  <text x="1010" y="112" text-anchor="middle" font-size="9"  fill="#fecaca">SMTP Gmail</text>

  <rect x="1127" y="78" width="146" height="44" rx="8" fill="#4338ca" stroke="#3730a3" stroke-width="1.5"/>
  <text x="1200" y="96"  text-anchor="middle" font-size="11" font-weight="bold" fill="#fff">ChatController</text>
  <text x="1200" y="112" text-anchor="middle" font-size="9"  fill="#c7d2fe">Gemini AI</text>

  <!-- Lifelines -->
  <line x1="75"   y1="122" x2="75"   y2="1180" stroke="#2563eb25" stroke-width="1.5" stroke-dasharray="6,4"/>
  <line x1="240"  y1="122" x2="240"  y2="1180" stroke="#15803d25" stroke-width="1.5" stroke-dasharray="6,4"/>
  <line x1="430"  y1="122" x2="430"  y2="1180" stroke="#6d28d925" stroke-width="1.5" stroke-dasharray="6,4"/>
  <line x1="620"  y1="122" x2="620"  y2="1180" stroke="#b4530925" stroke-width="1.5" stroke-dasharray="6,4"/>
  <line x1="820"  y1="122" x2="820"  y2="1180" stroke="#15803d25" stroke-width="1.5" stroke-dasharray="6,4"/>
  <line x1="1010" y1="122" x2="1010" y2="1180" stroke="#b91c1c25" stroke-width="1.5" stroke-dasharray="6,4"/>
  <line x1="1200" y1="122" x2="1200" y2="1180" stroke="#4338ca25" stroke-width="1.5" stroke-dasharray="6,4"/>

  <!-- Activation boxes -->
  <rect x="68"  y="148" width="14" height="50"  rx="2" fill="#2563eb30"/>
  <rect x="233" y="160" width="14" height="570" rx="2" fill="#15803d30"/>
  <rect x="423" y="174" width="14" height="240" rx="2" fill="#6d28d930"/>
  <rect x="613" y="188" width="14" height="420" rx="2" fill="#b4530930"/>
  <rect x="813" y="200" width="14" height="330" rx="2" fill="#15803d30"/>
  <rect x="1003" y="580" width="14" height="90" rx="2" fill="#b91c1c30"/>
  <rect x="1193" y="820" width="14" height="60" rx="2" fill="#4338ca30"/>

  <!-- ══ SECTION 1 ══ -->
  <rect x="60" y="140" width="1210" height="14" rx="3" fill="#dbeafe"/>
  <text x="650" y="151" text-anchor="middle" font-size="10" font-weight="bold" fill="#1d4ed8">① PASSER UNE COMMANDE</text>

  <line x1="75" y1="165" x2="233" y2="165" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arr-b)"/>
  <text x="153" y="158" text-anchor="middle" font-size="9" fill="#1d4ed8">1. Cliquer « Commander »</text>

  <rect x="175" y="173" width="130" height="20" rx="4" fill="#dcfce7"/>
  <text x="240" y="187" text-anchor="middle" font-size="9" fill="#14532d">2. Valider panier + adresse</text>

  <line x1="240" y1="200" x2="423" y2="200" stroke="#6d28d9" stroke-width="1.5" marker-end="url(#arr-p)"/>
  <text x="330" y="193" text-anchor="middle" font-size="9" fill="#5b21b6">3. POST /api/orders (JWT)</text>

  <line x1="430" y1="217" x2="613" y2="217" stroke="#b45309" stroke-width="1.5" marker-end="url(#arr-a)"/>
  <text x="520" y="210" text-anchor="middle" font-size="9" fill="#92400e">4. createOrder(order)</text>

  <rect x="555" y="225" width="130" height="28" rx="4" fill="#fef3c7"/>
  <text x="620" y="237" text-anchor="middle" font-size="9" fill="#78350f">5. status=EN_PREPARATION</text>
  <text x="620" y="248" text-anchor="middle" font-size="9" fill="#78350f">   paymentMethod=COD</text>

  <line x1="620" y1="263" x2="813" y2="263" stroke="#15803d" stroke-width="1.5" marker-end="url(#arr-g)"/>
  <text x="716" y="256" text-anchor="middle" font-size="9" fill="#14532d">6. orderRepository.save(order)</text>

  <line x1="813" y1="278" x2="627" y2="278" stroke="#15803d" stroke-width="1.2" stroke-dasharray="5,3" marker-end="url(#arr-ret)"/>
  <text x="716" y="271" text-anchor="middle" font-size="9" fill="#14532d">savedOrder (id assigné)</text>

  <rect x="60" y="290" width="1210" height="12" rx="2" fill="#f1f5f9"/>
  <text x="650" y="300" text-anchor="middle" font-size="9" fill="#64748b">loop [pour chaque OrderItem]</text>

  <line x1="620" y1="314" x2="813" y2="314" stroke="#15803d" stroke-width="1.5" marker-end="url(#arr-g)"/>
  <text x="716" y="307" text-anchor="middle" font-size="9" fill="#14532d">7a. decrementStock(bookId, qty)</text>

  <line x1="813" y1="329" x2="627" y2="329" stroke="#15803d" stroke-width="1.2" stroke-dasharray="5,3" marker-end="url(#arr-ret)"/>
  <text x="716" y="322" text-anchor="middle" font-size="9" fill="#14532d">updated=1 (sinon 400 stock insuffisant)</text>

  <line x1="620" y1="345" x2="813" y2="345" stroke="#15803d" stroke-width="1.5" marker-end="url(#arr-g)"/>
  <text x="716" y="338" text-anchor="middle" font-size="9" fill="#14532d">7b. save(book: soldCount++)</text>

  <line x1="620" y1="361" x2="813" y2="361" stroke="#15803d" stroke-width="1.5" marker-end="url(#arr-g)"/>
  <text x="716" y="354" text-anchor="middle" font-size="9" fill="#14532d">7c. save(StockMovement type=SALE)</text>

  <rect x="60" y="371" width="1210" height="10" rx="2" fill="#f1f5f9"/>
  <text x="650" y="380" text-anchor="middle" font-size="9" fill="#64748b">end loop</text>

  <line x1="620" y1="393" x2="1003" y2="393" stroke="#b91c1c" stroke-width="1.5" marker-end="url(#arr-r)"/>
  <text x="810" y="386" text-anchor="middle" font-size="9" fill="#991b1b">8. sendOrderConfirmation(savedOrder)</text>

  <rect x="945" y="401" width="130" height="30" rx="4" fill="#fee2e2"/>
  <text x="1010" y="413" text-anchor="middle" font-size="9" fill="#7f1d1d">9. HTML email envoyé</text>
  <text x="1010" y="425" text-anchor="middle" font-size="9" fill="#7f1d1d">   (détails + total)</text>

  <line x1="613" y1="442" x2="430" y2="442" stroke="#b45309" stroke-width="1.2" stroke-dasharray="5,3" marker-end="url(#arr-ret)"/>
  <text x="520" y="435" text-anchor="middle" font-size="9" fill="#92400e">10. return savedOrder</text>

  <line x1="423" y1="458" x2="240" y2="458" stroke="#6d28d9" stroke-width="1.2" stroke-dasharray="5,3" marker-end="url(#arr-ret)"/>
  <text x="330" y="451" text-anchor="middle" font-size="9" fill="#5b21b6">11. 201 Created {order JSON}</text>

  <rect x="175" y="466" width="130" height="20" rx="4" fill="#dcfce7"/>
  <text x="240" y="480" text-anchor="middle" font-size="9" fill="#14532d">12. navigate /orders + toast</text>

  <line x1="233" y1="495" x2="80" y2="495" stroke="#2563eb" stroke-width="1.2" stroke-dasharray="5,3" marker-end="url(#arr-ret)"/>
  <text x="153" y="488" text-anchor="middle" font-size="9" fill="#1d4ed8">Afficher mes commandes</text>

  <!-- ══ SECTION 2 ══ -->
  <rect x="60" y="514" width="1210" height="14" rx="3" fill="#fef3c7"/>
  <text x="650" y="525" text-anchor="middle" font-size="10" font-weight="bold" fill="#92400e">② ADMIN — Mise à jour statut + Chronopost</text>

  <line x1="240" y1="542" x2="423" y2="542" stroke="#6d28d9" stroke-width="1.5" marker-end="url(#arr-p)"/>
  <text x="330" y="535" text-anchor="middle" font-size="9" fill="#5b21b6">13. PATCH /admin/orders/{id}/status</text>

  <rect x="365" y="550" width="130" height="28" rx="4" fill="#ede9fe"/>
  <text x="430" y="562" text-anchor="middle" font-size="9" fill="#3b0764">14. si EXPEDIEE →</text>
  <text x="430" y="574" text-anchor="middle" font-size="9" fill="#3b0764">    generateChronopost()</text>

  <line x1="430" y1="589" x2="813" y2="589" stroke="#15803d" stroke-width="1.5" marker-end="url(#arr-g)"/>
  <text x="620" y="582" text-anchor="middle" font-size="9" fill="#14532d">15. save(order + trackingNumber)</text>

  <line x1="430" y1="606" x2="1003" y2="606" stroke="#b91c1c" stroke-width="1.5" marker-end="url(#arr-r)"/>
  <text x="716" y="599" text-anchor="middle" font-size="9" fill="#991b1b">16. sendStatusUpdate(order, EXPEDIEE)</text>

  <rect x="945" y="614" width="130" height="42" rx="4" fill="#fee2e2"/>
  <text x="1010" y="626" text-anchor="middle" font-size="9" fill="#7f1d1d">17. HTML email avec</text>
  <text x="1010" y="638" text-anchor="middle" font-size="9" fill="#7f1d1d">    N° Chronopost CP…FR</text>
  <text x="1010" y="650" text-anchor="middle" font-size="9" fill="#7f1d1d">    + bouton « Suivre colis »</text>

  <line x1="423" y1="668" x2="240" y2="668" stroke="#6d28d9" stroke-width="1.2" stroke-dasharray="5,3" marker-end="url(#arr-ret)"/>
  <text x="330" y="661" text-anchor="middle" font-size="9" fill="#5b21b6">18. {order + trackingNumber}</text>

  <!-- ══ SECTION 3 ══ -->
  <rect x="60" y="686" width="1210" height="14" rx="3" fill="#dbeafe"/>
  <text x="650" y="697" text-anchor="middle" font-size="10" font-weight="bold" fill="#1d4ed8">③ CLIENT — Suivi commande (TrackingPage)</text>

  <line x1="75" y1="715" x2="233" y2="715" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arr-b)"/>
  <text x="153" y="708" text-anchor="middle" font-size="9" fill="#1d4ed8">19. « Suivre ma commande »</text>

  <line x1="240" y1="732" x2="423" y2="732" stroke="#6d28d9" stroke-width="1.5" marker-end="url(#arr-p)"/>
  <text x="330" y="725" text-anchor="middle" font-size="9" fill="#5b21b6">20. GET /api/orders/{id}</text>

  <line x1="430" y1="749" x2="813" y2="749" stroke="#15803d" stroke-width="1.5" marker-end="url(#arr-g)"/>
  <text x="620" y="742" text-anchor="middle" font-size="9" fill="#14532d">21. findById + init items @ElementCollection</text>

  <line x1="813" y1="765" x2="247" y2="765" stroke="#15803d" stroke-width="1.2" stroke-dasharray="5,3" marker-end="url(#arr-ret)"/>
  <text x="530" y="758" text-anchor="middle" font-size="9" fill="#14532d">Order {status, trackingNumber, items, totalAmount…}</text>

  <line x1="233" y1="782" x2="80" y2="782" stroke="#2563eb" stroke-width="1.2" stroke-dasharray="5,3" marker-end="url(#arr-ret)"/>
  <text x="153" y="775" text-anchor="middle" font-size="9" fill="#1d4ed8">22. Afficher stepper + N° Chronopost</text>

  <!-- ══ SECTION 4 ══ -->
  <rect x="60" y="800" width="1210" height="14" rx="3" fill="#e0e7ff"/>
  <text x="650" y="811" text-anchor="middle" font-size="10" font-weight="bold" fill="#3730a3">④ CHATBOT — Gemini AI</text>

  <line x1="75" y1="828" x2="233" y2="828" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arr-b)"/>
  <text x="153" y="821" text-anchor="middle" font-size="9" fill="#1d4ed8">23. Envoyer message chatbot</text>

  <line x1="240" y1="845" x2="1193" y2="845" stroke="#4338ca" stroke-width="1.5" marker-end="url(#arr-i)"/>
  <text x="716" y="838" text-anchor="middle" font-size="9" fill="#3730a3">24. POST /api/chat {message, historique} (JWT)</text>

  <rect x="1135" y="853" width="130" height="28" rx="4" fill="#e0e7ff"/>
  <text x="1200" y="865" text-anchor="middle" font-size="9" fill="#312e81">25. Gemini génère</text>
  <text x="1200" y="877" text-anchor="middle" font-size="9" fill="#312e81">    réponse contextuelle</text>

  <line x1="1193" y1="892" x2="247" y2="892" stroke="#4338ca" stroke-width="1.2" stroke-dasharray="5,3" marker-end="url(#arr-ret)"/>
  <text x="716" y="885" text-anchor="middle" font-size="9" fill="#3730a3">26. {response: "…"} → bulle bot</text>

  <line x1="233" y1="910" x2="80" y2="910" stroke="#2563eb" stroke-width="1.2" stroke-dasharray="5,3" marker-end="url(#arr-ret)"/>
  <text x="153" y="903" text-anchor="middle" font-size="9" fill="#1d4ed8">Réponse affichée dans chatbot</text>

  <!-- ══ SECTION 5 ══ -->
  <rect x="60" y="930" width="1210" height="14" rx="3" fill="#dcfce7"/>
  <text x="650" y="941" text-anchor="middle" font-size="10" font-weight="bold" fill="#15803d">⑤ AUTH — Inscription avec vérification email (AuthController)</text>

  <rect x="233" y="953" width="14" height="200" rx="2" fill="#15803d30"/>
  <rect x="423" y="967" width="14" height="120" rx="2" fill="#6d28d930"/>
  <rect x="1003" y="980" width="14" height="50" rx="2" fill="#b91c1c30"/>
  <rect x="813" y="1060" width="14" height="60" rx="2" fill="#15803d30"/>

  <line x1="75" y1="963" x2="233" y2="963" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arr-b)"/>
  <text x="153" y="956" text-anchor="middle" font-size="9" fill="#1d4ed8">27. Cliquer « S'inscrire »</text>

  <rect x="175" y="971" width="130" height="20" rx="4" fill="#dcfce7"/>
  <text x="240" y="985" text-anchor="middle" font-size="9" fill="#14532d">28. Saisir email → demander code</text>

  <line x1="240" y1="1000" x2="423" y2="1000" stroke="#6d28d9" stroke-width="1.5" marker-end="url(#arr-p)"/>
  <text x="330" y="993" text-anchor="middle" font-size="9" fill="#5b21b6">29. POST /api/auth/send-verification-code</text>

  <rect x="365" y="1008" width="130" height="20" rx="4" fill="#ede9fe"/>
  <text x="430" y="1022" text-anchor="middle" font-size="9" fill="#3b0764">30. génère code 6 chiffres (15 min)</text>

  <line x1="430" y1="1038" x2="1003" y2="1038" stroke="#b91c1c" stroke-width="1.5" marker-end="url(#arr-r)"/>
  <text x="716" y="1031" text-anchor="middle" font-size="9" fill="#991b1b">31. sendVerificationCode(email, code)</text>

  <rect x="945" y="1043" width="130" height="20" rx="4" fill="#fee2e2"/>
  <text x="1010" y="1057" text-anchor="middle" font-size="9" fill="#7f1d1d">Email avec code à 6 chiffres envoyé</text>

  <line x1="423" y1="1075" x2="240" y2="1075" stroke="#6d28d9" stroke-width="1.2" stroke-dasharray="5,3" marker-end="url(#arr-ret)"/>
  <text x="330" y="1068" text-anchor="middle" font-size="9" fill="#5b21b6">32. 200 OK — code envoyé</text>

  <rect x="175" y="1083" width="130" height="20" rx="4" fill="#dcfce7"/>
  <text x="240" y="1097" text-anchor="middle" font-size="9" fill="#14532d">33. Saisir code + infos profil</text>

  <line x1="240" y1="1110" x2="423" y2="1110" stroke="#6d28d9" stroke-width="1.5" marker-end="url(#arr-p)"/>
  <text x="330" y="1103" text-anchor="middle" font-size="9" fill="#5b21b6">34. POST /api/auth/verify-signup {code, userData}</text>

  <line x1="430" y1="1127" x2="813" y2="1127" stroke="#15803d" stroke-width="1.5" marker-end="url(#arr-g)"/>
  <text x="620" y="1120" text-anchor="middle" font-size="9" fill="#14532d">35. valide code → save(User) → JWT</text>

  <line x1="813" y1="1143" x2="247" y2="1143" stroke="#15803d" stroke-width="1.2" stroke-dasharray="5,3" marker-end="url(#arr-ret)"/>
  <text x="530" y="1136" text-anchor="middle" font-size="9" fill="#14532d">JWT token</text>

  <rect x="175" y="1150" width="130" height="20" rx="4" fill="#dcfce7"/>
  <text x="240" y="1164" text-anchor="middle" font-size="9" fill="#14532d">36. localStorage ← JWT → navigate /</text>
</svg>
