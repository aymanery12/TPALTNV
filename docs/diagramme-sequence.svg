<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 860" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#64748b"/></marker>
    <marker id="arr-ret" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto"><polygon points="10 0,0 3.5,10 7" fill="#64748b"/></marker>
    <marker id="arr-grn" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#10b981"/></marker>
    <marker id="arr-amb" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#f59e0b"/></marker>
    <marker id="arr-red" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#ef4444"/></marker>
  </defs>
  <rect width="1200" height="860" fill="#0f1117"/>
  <text x="600" y="36" text-anchor="middle" font-size="20" font-weight="bold" fill="#f1f5f9">Diagramme de Séquence — Passage de Commande</text>
  <text x="600" y="56" text-anchor="middle" font-size="12" fill="#64748b">Flux complet : panier → commande → email → suivi Chronopost</text>
  <line x1="80" y1="66" x2="1120" y2="66" stroke="#ffffff15" stroke-width="1"/>

  <!-- Lifeline headers -->
  <!-- Client/User: x=80 -->
  <rect x="20" y="78" width="120" height="44" rx="8" fill="#1d4ed8" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="80" y="96" text-anchor="middle" font-size="11" font-weight="bold" fill="#fff">Utilisateur</text>
  <text x="80" y="112" text-anchor="middle" font-size="9" fill="#bfdbfe">(Navigateur)</text>

  <!-- Angular Frontend: x=260 -->
  <rect x="190" y="78" width="140" height="44" rx="8" fill="#065f46" stroke="#10b981" stroke-width="1.5"/>
  <text x="260" y="96" text-anchor="middle" font-size="11" font-weight="bold" fill="#fff">Angular Frontend</text>
  <text x="260" y="112" text-anchor="middle" font-size="9" fill="#a7f3d0">CheckoutComponent</text>

  <!-- OrderController: x=460 -->
  <rect x="390" y="78" width="140" height="44" rx="8" fill="#7c3aed" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="460" y="96" text-anchor="middle" font-size="11" font-weight="bold" fill="#fff">OrderController</text>
  <text x="460" y="112" text-anchor="middle" font-size="9" fill="#ddd6fe">POST /api/orders</text>

  <!-- OrderService: x=650 -->
  <rect x="578" y="78" width="144" height="44" rx="8" fill="#92400e" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="650" y="96" text-anchor="middle" font-size="11" font-weight="bold" fill="#fff">OrderService</text>
  <text x="650" y="112" text-anchor="middle" font-size="9" fill="#fde68a">@Transactional</text>

  <!-- Repository: x=850 -->
  <rect x="778" y="78" width="144" height="44" rx="8" fill="#166534" stroke="#22c55e" stroke-width="1.5"/>
  <text x="850" y="96" text-anchor="middle" font-size="11" font-weight="bold" fill="#fff">Repository / DB</text>
  <text x="850" y="112" text-anchor="middle" font-size="9" fill="#bbf7d0">JPA + MySQL</text>

  <!-- EmailService: x=1060 -->
  <rect x="988" y="78" width="144" height="44" rx="8" fill="#7f1d1d" stroke="#ef4444" stroke-width="1.5"/>
  <text x="1060" y="96" text-anchor="middle" font-size="11" font-weight="bold" fill="#fff">EmailService</text>
  <text x="1060" y="112" text-anchor="middle" font-size="9" fill="#fecaca">SMTP Gmail</text>

  <!-- Lifelines (vertical dashed lines) -->
  <line x1="80" y1="122" x2="80" y2="840" stroke="#3b82f630" stroke-width="1.5" stroke-dasharray="6,4"/>
  <line x1="260" y1="122" x2="260" y2="840" stroke="#10b98130" stroke-width="1.5" stroke-dasharray="6,4"/>
  <line x1="460" y1="122" x2="460" y2="840" stroke="#8b5cf630" stroke-width="1.5" stroke-dasharray="6,4"/>
  <line x1="650" y1="122" x2="650" y2="840" stroke="#f59e0b30" stroke-width="1.5" stroke-dasharray="6,4"/>
  <line x1="850" y1="122" x2="850" y2="840" stroke="#22c55e30" stroke-width="1.5" stroke-dasharray="6,4"/>
  <line x1="1060" y1="122" x2="1060" y2="840" stroke="#ef444430" stroke-width="1.5" stroke-dasharray="6,4"/>

  <!-- Activation boxes -->
  <rect x="73" y="148" width="14" height="62" rx="2" fill="#3b82f640"/>
  <rect x="253" y="162" width="14" height="580" rx="2" fill="#10b98140"/>
  <rect x="453" y="178" width="14" height="200" rx="2" fill="#8b5cf640"/>
  <rect x="643" y="192" width="14" height="500" rx="2" fill="#f59e0b40"/>
  <rect x="843" y="206" width="14" height="300" rx="2" fill="#22c55e40"/>
  <rect x="1053" y="640" width="14" height="80" rx="2" fill="#ef444440"/>

  <!-- ══ SEQUENCE STEPS ══ -->

  <!-- 1. User clicks Commander -->
  <line x1="80" y1="150" x2="255" y2="150" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="165" y="144" text-anchor="middle" font-size="10" fill="#60a5fa">1. Cliquer sur « Commander »</text>

  <!-- 2. CheckoutComponent validates cart -->
  <rect x="195" y="160" width="130" height="24" rx="4" fill="#065f46aa"/>
  <text x="260" y="176" text-anchor="middle" font-size="9" fill="#a7f3d0">2. Valider panier + adresse</text>

  <!-- 3. POST /api/orders -->
  <line x1="260" y1="192" x2="455" y2="192" stroke="#8b5cf6" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="355" y="186" text-anchor="middle" font-size="10" fill="#a78bfa">3. POST /api/orders (JWT)</text>

  <!-- 4. OrderController -> OrderService.createOrder -->
  <line x1="460" y1="210" x2="645" y2="210" stroke="#f59e0b" stroke-width="1.5" marker-end="url(#arr-amb)"/>
  <text x="553" y="204" text-anchor="middle" font-size="10" fill="#fbbf24">4. createOrder(order)</text>

  <!-- 5. setStatus EN_PREPARATION / setPaymentMethod COD -->
  <rect x="585" y="218" width="130" height="30" rx="4" fill="#92400eaa"/>
  <text x="650" y="231" text-anchor="middle" font-size="9" fill="#fde68a">5. status=EN_PREPARATION</text>
  <text x="650" y="243" text-anchor="middle" font-size="9" fill="#fde68a">   paymentMethod=COD</text>

  <!-- 6. orderRepository.save(order) -->
  <line x1="650" y1="258" x2="845" y2="258" stroke="#22c55e" stroke-width="1.5" marker-end="url(#arr-grn)"/>
  <text x="748" y="252" text-anchor="middle" font-size="10" fill="#86efac">6. save(order) → id</text>

  <!-- 7. DB returns order with id -->
  <line x1="843" y1="274" x2="660" y2="274" stroke="#22c55e" stroke-width="1.2" stroke-dasharray="5,3" marker-end="url(#arr-ret)"/>
  <text x="748" y="268" text-anchor="middle" font-size="9" fill="#86efac">savedOrder (id assigné)</text>

  <!-- 8. For each item: bookRepository.decrementStock -->
  <rect x="30" y="290" width="1140" height="14" rx="3" fill="#ffffff08"/>
  <text x="600" y="301" text-anchor="middle" font-size="9" fill="#64748b">loop  [pour chaque OrderItem]</text>

  <line x1="650" y1="314" x2="845" y2="314" stroke="#22c55e" stroke-width="1.5" marker-end="url(#arr-grn)"/>
  <text x="748" y="308" text-anchor="middle" font-size="10" fill="#86efac">8a. decrementStock(bookId, qty)</text>

  <line x1="843" y1="330" x2="660" y2="330" stroke="#22c55e" stroke-width="1.2" stroke-dasharray="5,3" marker-end="url(#arr-ret)"/>
  <text x="748" y="324" text-anchor="middle" font-size="9" fill="#86efac">updated=1 (ou 0 → exception stock insuffisant)</text>

  <!-- 9. updatedBook.setSoldCount / setStatus OUT_OF_STOCK -->
  <rect x="585" y="340" width="130" height="30" rx="4" fill="#92400eaa"/>
  <text x="650" y="353" text-anchor="middle" font-size="9" fill="#fde68a">9. setSoldCount++</text>
  <text x="650" y="365" text-anchor="middle" font-size="9" fill="#fde68a">   si stock≤0 → OUT_OF_STOCK</text>

  <!-- 10. bookRepository.save(updatedBook) -->
  <line x1="650" y1="382" x2="845" y2="382" stroke="#22c55e" stroke-width="1.5" marker-end="url(#arr-grn)"/>
  <text x="748" y="376" text-anchor="middle" font-size="10" fill="#86efac">10. save(updatedBook)</text>

  <!-- 11. StockMovement.save -->
  <line x1="650" y1="400" x2="845" y2="400" stroke="#22c55e" stroke-width="1.5" marker-end="url(#arr-grn)"/>
  <text x="748" y="394" text-anchor="middle" font-size="10" fill="#86efac">11. save(StockMovement  type=SALE)</text>

  <!-- end loop -->
  <rect x="30" y="412" width="1140" height="8" rx="3" fill="#ffffff08"/>
  <text x="600" y="420" text-anchor="middle" font-size="9" fill="#64748b">end loop</text>

  <!-- 12. emailService.sendOrderConfirmation -->
  <line x1="650" y1="436" x2="1055" y2="436" stroke="#ef4444" stroke-width="1.5" marker-end="url(#arr-red)"/>
  <text x="852" y="430" text-anchor="middle" font-size="10" fill="#fca5a5">12. sendOrderConfirmation(order)</text>

  <!-- 13. Gmail SMTP -->
  <rect x="988" y="444" width="130" height="30" rx="4" fill="#7f1d1daa"/>
  <text x="1053" y="457" text-anchor="middle" font-size="9" fill="#fecaca">13. HTML email envoyé</text>
  <text x="1053" y="469" text-anchor="middle" font-size="9" fill="#fecaca">    (détails + total)</text>

  <!-- 14. return savedOrder -->
  <line x1="643" y1="486" x2="460" y2="486" stroke="#f59e0b" stroke-width="1.2" stroke-dasharray="5,3" marker-end="url(#arr-ret)"/>
  <text x="553" y="480" text-anchor="middle" font-size="10" fill="#fbbf24">14. return savedOrder</text>

  <!-- 15. HTTP 201 Created -->
  <line x1="453" y1="504" x2="265" y2="504" stroke="#8b5cf6" stroke-width="1.2" stroke-dasharray="5,3" marker-end="url(#arr-ret)"/>
  <text x="358" y="498" text-anchor="middle" font-size="10" fill="#a78bfa">15. 201 Created {order JSON}</text>

  <!-- 16. navigate to /orders -->
  <rect x="195" y="514" width="130" height="24" rx="4" fill="#065f46aa"/>
  <text x="260" y="530" text-anchor="middle" font-size="9" fill="#a7f3d0">16. navigate /orders + toast</text>

  <!-- 17. User views orders -->
  <line x1="260" y1="546" x2="82" y2="546" stroke="#3b82f6" stroke-width="1.2" stroke-dasharray="5,3" marker-end="url(#arr-ret)"/>
  <text x="165" y="540" text-anchor="middle" font-size="9" fill="#60a5fa">Afficher mes commandes</text>

  <!-- ══ ADMIN UPDATES STATUS ══ -->
  <rect x="30" y="566" width="1140" height="14" rx="3" fill="#ffffff0a"/>
  <text x="600" y="577" text-anchor="middle" font-size="10" font-weight="bold" fill="#f59e0b">ADMIN — Mise à jour du statut</text>

  <!-- 18. Admin PATCH /admin/orders/{id}/status -->
  <line x1="260" y1="594" x2="455" y2="594" stroke="#8b5cf6" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="357" y="588" text-anchor="middle" font-size="10" fill="#a78bfa">18. PATCH /admin/orders/{id}/status</text>

  <!-- 19. si EXPEDIEE → generateChronopostNumber -->
  <rect x="393" y="602" width="130" height="30" rx="4" fill="#4c1d95aa"/>
  <text x="460" y="615" text-anchor="middle" font-size="9" fill="#ddd6fe">19. si EXPEDIEE →</text>
  <text x="460" y="627" text-anchor="middle" font-size="9" fill="#ddd6fe">    generateChronopost()</text>

  <!-- 20. save order with trackingNumber -->
  <line x1="460" y1="642" x2="845" y2="642" stroke="#22c55e" stroke-width="1.5" marker-end="url(#arr-grn)"/>
  <text x="650" y="636" text-anchor="middle" font-size="10" fill="#86efac">20. save(order + trackingNumber)</text>

  <!-- 21. sendStatusUpdate email -->
  <line x1="460" y1="660" x2="1055" y2="660" stroke="#ef4444" stroke-width="1.5" marker-end="url(#arr-red)"/>
  <text x="756" y="654" text-anchor="middle" font-size="10" fill="#fca5a5">21. sendStatusUpdate(order, newStatus)</text>

  <rect x="988" y="668" width="130" height="42" rx="4" fill="#7f1d1daa"/>
  <text x="1053" y="681" text-anchor="middle" font-size="9" fill="#fecaca">22. HTML email avec</text>
  <text x="1053" y="693" text-anchor="middle" font-size="9" fill="#fecaca">    N° Chronopost</text>
  <text x="1053" y="705" text-anchor="middle" font-size="9" fill="#fecaca">    + bouton suivi</text>

  <!-- 23. return updated order -->
  <line x1="453" y1="722" x2="265" y2="722" stroke="#8b5cf6" stroke-width="1.2" stroke-dasharray="5,3" marker-end="url(#arr-ret)"/>
  <text x="357" y="716" text-anchor="middle" font-size="10" fill="#a78bfa">23. {order + trackingNumber}</text>

  <!-- ══ CLIENT TRACKING ══ -->
  <rect x="30" y="742" width="1140" height="14" rx="3" fill="#ffffff08"/>
  <text x="600" y="753" text-anchor="middle" font-size="10" font-weight="bold" fill="#3b82f6">CLIENT — Suivi commande</text>

  <line x1="80" y1="772" x2="255" y2="772" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="165" y="766" text-anchor="middle" font-size="10" fill="#60a5fa">24. Cliquer « Suivre ma commande »</text>

  <line x1="260" y1="790" x2="455" y2="790" stroke="#8b5cf6" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="357" y="784" text-anchor="middle" font-size="10" fill="#a78bfa">25. GET /api/orders/{id}</text>

  <line x1="460" y1="808" x2="845" y2="808" stroke="#22c55e" stroke-width="1.5" marker-end="url(#arr-grn)"/>
  <text x="650" y="802" text-anchor="middle" font-size="10" fill="#86efac">26. findById (+ init items)</text>

  <line x1="843" y1="822" x2="267" y2="822" stroke="#22c55e" stroke-width="1.2" stroke-dasharray="5,3" marker-end="url(#arr-ret)"/>
  <text x="556" y="816" text-anchor="middle" font-size="10" fill="#86efac">Order {status, trackingNumber, items…}</text>

  <line x1="260" y1="838" x2="82" y2="838" stroke="#3b82f6" stroke-width="1.2" stroke-dasharray="5,3" marker-end="url(#arr-ret)"/>
  <text x="165" y="832" text-anchor="middle" font-size="10" fill="#60a5fa">27. Afficher TrackingPage + stepper</text>
</svg>
