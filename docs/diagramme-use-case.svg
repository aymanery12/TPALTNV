  <!-- Visiteur hérite Client -->
  <line x1="65" y1="370" x2="65" y2="582" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="6,3"/>
  <polygon points="60,370,70,370,65,356" fill="none" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="16" y="480" font-size="9" fill="#94a3b8" transform="rotate(-90,16,480)">hérite</text>

  <!-- LEGEND -->
  <rect x="188" y="942" width="580" height="30" rx="6" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1"/>
  <line x1="206" y1="957" x2="240" y2="957" stroke="#2563eb" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr-inc)"/>
