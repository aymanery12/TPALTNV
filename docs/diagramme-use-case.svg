<svg width="940" height="750" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Arial, sans-serif">

  <!-- Fond -->
  <rect width="940" height="750" fill="#f8fafc" rx="10"/>
  <text x="470" y="30" text-anchor="middle" font-size="19" font-weight="bold" fill="#0f172a">Diagramme de Cas d'Utilisation — BookStore IA</text>

  <!-- ── System Boundary ── -->
  <rect x="195" y="48" width="550" height="680" rx="8" fill="white" stroke="#475569" stroke-width="2"/>
  <text x="470" y="68" text-anchor="middle" font-size="13" font-weight="bold" fill="#475569">« Système »  BookStore IA</text>

  <!-- ══════════════════════════════════════════ -->
  <!-- ── USE CASES (ellipses) ── -->
  <!-- ══════════════════════════════════════════ -->

  <!-- ── Zone Visiteur (shared) ── -->
  <rect x="202" y="75" width="260" height="20" rx="3" fill="#f1f5f9"/>
  <text x="332" y="88" text-anchor="middle" font-size="10" fill="#64748b" font-weight="bold">Visiteur (non authentifié)</text>

  <ellipse cx="332" cy="118" rx="118" ry="16" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="332" y="122" text-anchor="middle" font-size="11" fill="#1d4ed8">Parcourir le catalogue</text>

  <ellipse cx="332" cy="158" rx="118" ry="16" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="332" y="162" text-anchor="middle" font-size="11" fill="#1d4ed8">Rechercher un livre</text>

  <ellipse cx="332" cy="198" rx="118" ry="16" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="332" y="202" text-anchor="middle" font-size="11" fill="#1d4ed8">Voir détails d'un livre</text>

  <ellipse cx="332" cy="238" rx="118" ry="16" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="332" y="242" text-anchor="middle" font-size="11" fill="#1d4ed8">S'inscrire</text>

  <ellipse cx="332" cy="278" rx="118" ry="16" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="332" y="282" text-anchor="middle" font-size="11" fill="#1d4ed8">Se connecter (JWT)</text>

  <!-- Separator line -->
  <line x1="205" y1="305" x2="455" y2="305" stroke="#e2e8f0" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- ── Zone Client Authentifié ── -->
  <rect x="202" y="308" width="260" height="20" rx="3" fill="#f0fdf4"/>
  <text x="332" y="321" text-anchor="middle" font-size="10" fill="#15803d" font-weight="bold">Client (authentifié)</text>

  <ellipse cx="332" cy="353" rx="118" ry="16" fill="#f0fdf4" stroke="#16a34a" stroke-width="1.5"/>
  <text x="332" y="357" text-anchor="middle" font-size="11" fill="#15803d">Ajouter au panier</text>

  <ellipse cx="332" cy="393" rx="118" ry="16" fill="#f0fdf4" stroke="#16a34a" stroke-width="1.5"/>
  <text x="332" y="397" text-anchor="middle" font-size="11" fill="#15803d">Passer une commande</text>

  <ellipse cx="332" cy="433" rx="118" ry="16" fill="#f0fdf4" stroke="#16a34a" stroke-width="1.5"/>
  <text x="332" y="437" text-anchor="middle" font-size="11" fill="#15803d">Consulter mes commandes</text>

  <ellipse cx="332" cy="473" rx="118" ry="16" fill="#f0fdf4" stroke="#16a34a" stroke-width="1.5"/>
  <text x="332" y="477" text-anchor="middle" font-size="11" fill="#15803d">Écrire un avis</text>

  <ellipse cx="332" cy="513" rx="118" ry="16" fill="#f0fdf4" stroke="#16a34a" stroke-width="1.5"/>
  <text x="332" y="517" text-anchor="middle" font-size="11" fill="#15803d">Chatbot IA (Gemini)</text>

  <ellipse cx="332" cy="553" rx="118" ry="16" fill="#f0fdf4" stroke="#16a34a" stroke-width="1.5"/>
  <text x="332" y="557" text-anchor="middle" font-size="11" fill="#15803d">Gérer profil</text>

  <ellipse cx="332" cy="593" rx="118" ry="16" fill="#f0fdf4" stroke="#16a34a" stroke-width="1.5"/>
  <text x="332" y="597" text-anchor="middle" font-size="11" fill="#15803d">Liste de souhaits</text>

  <!-- ── Zone Admin ── -->
  <rect x="478" y="75" width="260" height="20" rx="3" fill="#fef2f2"/>
  <text x="608" y="88" text-anchor="middle" font-size="10" fill="#991b1b" font-weight="bold">Administrateur</text>

  <ellipse cx="608" cy="120" rx="118" ry="16" fill="#fef2f2" stroke="#ef4444" stroke-width="1.5"/>
  <text x="608" y="124" text-anchor="middle" font-size="11" fill="#991b1b">Tableau de bord</text>

  <ellipse cx="608" cy="170" rx="118" ry="16" fill="#fef2f2" stroke="#ef4444" stroke-width="1.5"/>
  <text x="608" y="174" text-anchor="middle" font-size="11" fill="#991b1b">Gérer les livres (CRUD)</text>

  <ellipse cx="608" cy="220" rx="118" ry="16" fill="#fef2f2" stroke="#ef4444" stroke-width="1.5"/>
  <text x="608" y="224" text-anchor="middle" font-size="11" fill="#991b1b">Gérer les commandes</text>

  <ellipse cx="608" cy="270" rx="118" ry="16" fill="#fef2f2" stroke="#ef4444" stroke-width="1.5"/>
  <text x="608" y="274" text-anchor="middle" font-size="11" fill="#991b1b">Gérer les stocks</text>

  <ellipse cx="608" cy="320" rx="118" ry="16" fill="#fef2f2" stroke="#ef4444" stroke-width="1.5"/>
  <text x="608" y="324" text-anchor="middle" font-size="11" fill="#991b1b">Voir les statistiques</text>

  <ellipse cx="608" cy="370" rx="118" ry="16" fill="#fef2f2" stroke="#ef4444" stroke-width="1.5"/>
  <text x="608" y="374" text-anchor="middle" font-size="11" fill="#991b1b">Gérer les utilisateurs</text>

  <ellipse cx="608" cy="420" rx="118" ry="16" fill="#fef2f2" stroke="#ef4444" stroke-width="1.5"/>
  <text x="608" y="424" text-anchor="middle" font-size="11" fill="#991b1b">Mouvements de stock</text>

  <!-- ══════════════════════════════════════════ -->
  <!-- ── ACTORS (stick figures) ── -->
  <!-- ══════════════════════════════════════════ -->

  <!-- ── Visiteur (left, y≈190) ── -->
  <!-- head -->
  <circle cx="90" cy="168" r="14" fill="none" stroke="#3b82f6" stroke-width="2"/>
  <!-- body -->
  <line x1="90" y1="182" x2="90" y2="225" stroke="#3b82f6" stroke-width="2"/>
  <!-- arms -->
  <line x1="90" y1="200" x2="65" y2="218" stroke="#3b82f6" stroke-width="2"/>
  <line x1="90" y1="200" x2="115" y2="218" stroke="#3b82f6" stroke-width="2"/>
  <!-- legs -->
  <line x1="90" y1="225" x2="70" y2="250" stroke="#3b82f6" stroke-width="2"/>
  <line x1="90" y1="225" x2="110" y2="250" stroke="#3b82f6" stroke-width="2"/>
  <text x="90" y="270" text-anchor="middle" font-size="12" font-weight="bold" fill="#1d4ed8">Visiteur</text>

  <!-- ── Client Authentifié (left, y≈440) ── -->
  <circle cx="90" cy="408" r="14" fill="none" stroke="#16a34a" stroke-width="2"/>
  <line x1="90" y1="422" x2="90" y2="465" stroke="#16a34a" stroke-width="2"/>
  <line x1="90" y1="440" x2="65" y2="458" stroke="#16a34a" stroke-width="2"/>
  <line x1="90" y1="440" x2="115" y2="458" stroke="#16a34a" stroke-width="2"/>
  <line x1="90" y1="465" x2="70" y2="490" stroke="#16a34a" stroke-width="2"/>
  <line x1="90" y1="465" x2="110" y2="490" stroke="#16a34a" stroke-width="2"/>
  <text x="90" y="510" text-anchor="middle" font-size="12" font-weight="bold" fill="#15803d">Client</text>
  <text x="90" y="525" text-anchor="middle" font-size="10" fill="#15803d">(authentifié)</text>

  <!-- ── Admin (right, y≈280) ── -->
  <circle cx="860" cy="248" r="14" fill="none" stroke="#ef4444" stroke-width="2"/>
  <line x1="860" y1="262" x2="860" y2="305" stroke="#ef4444" stroke-width="2"/>
  <line x1="860" y1="280" x2="835" y2="298" stroke="#ef4444" stroke-width="2"/>
  <line x1="860" y1="280" x2="885" y2="298" stroke="#ef4444" stroke-width="2"/>
  <line x1="860" y1="305" x2="840" y2="330" stroke="#ef4444" stroke-width="2"/>
  <line x1="860" y1="305" x2="880" y2="330" stroke="#ef4444" stroke-width="2"/>
  <text x="860" y="350" text-anchor="middle" font-size="12" font-weight="bold" fill="#991b1b">Admin</text>

  <!-- ══════════════════════════════════════════ -->
  <!-- ── CONNECTIONS: Visiteur → Use Cases ── -->
  <!-- ══════════════════════════════════════════ -->
  <line x1="104" y1="175" x2="213" y2="118" stroke="#3b82f6" stroke-width="1.2"/>
  <line x1="104" y1="183" x2="213" y2="158" stroke="#3b82f6" stroke-width="1.2"/>
  <line x1="104" y1="195" x2="213" y2="198" stroke="#3b82f6" stroke-width="1.2"/>
  <line x1="104" y1="210" x2="213" y2="238" stroke="#3b82f6" stroke-width="1.2"/>
  <line x1="104" y1="220" x2="213" y2="278" stroke="#3b82f6" stroke-width="1.2"/>

  <!-- ── CONNECTIONS: Client → Use Cases ── -->
  <line x1="104" y1="415" x2="213" y2="353" stroke="#16a34a" stroke-width="1.2"/>
  <line x1="104" y1="425" x2="213" y2="393" stroke="#16a34a" stroke-width="1.2"/>
  <line x1="104" y1="435" x2="213" y2="433" stroke="#16a34a" stroke-width="1.2"/>
  <line x1="104" y1="445" x2="213" y2="473" stroke="#16a34a" stroke-width="1.2"/>
  <line x1="104" y1="455" x2="213" y2="513" stroke="#16a34a" stroke-width="1.2"/>
  <line x1="104" y1="462" x2="213" y2="553" stroke="#16a34a" stroke-width="1.2"/>
  <line x1="104" y1="468" x2="213" y2="593" stroke="#16a34a" stroke-width="1.2"/>

  <!-- Client extends Visiteur (dashed arrow) -->
  <line x1="90" y1="395" x2="90" y2="280" stroke="#64748b" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr-extend)"/>
  <text x="50" y="340" font-size="10" fill="#64748b" font-style="italic">«extends»</text>
  <defs>
    <marker id="arr-extend" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#64748b"/>
    </marker>
  </defs>

  <!-- ── CONNECTIONS: Admin → Use Cases ── -->
  <line x1="847" y1="255" x2="727" y2="120" stroke="#ef4444" stroke-width="1.2"/>
  <line x1="848" y1="263" x2="727" y2="170" stroke="#ef4444" stroke-width="1.2"/>
  <line x1="849" y1="271" x2="727" y2="220" stroke="#ef4444" stroke-width="1.2"/>
  <line x1="849" y1="280" x2="727" y2="270" stroke="#ef4444" stroke-width="1.2"/>
  <line x1="849" y1="290" x2="727" y2="320" stroke="#ef4444" stroke-width="1.2"/>
  <line x1="848" y1="298" x2="727" y2="370" stroke="#ef4444" stroke-width="1.2"/>
  <line x1="847" y1="306" x2="727" y2="420" stroke="#ef4444" stroke-width="1.2"/>

  <!-- ── Légende ── -->
  <rect x="205" y="630" width="530" height="88" rx="6" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
  <text x="470" y="648" text-anchor="middle" font-size="11" font-weight="bold" fill="#0f172a">Légende</text>
  <ellipse cx="255" cy="668" rx="30" ry="10" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="295" y="672" font-size="10" fill="#334155">Cas d'utilisation Visiteur</text>
  <ellipse cx="255" cy="692" rx="30" ry="10" fill="#f0fdf4" stroke="#16a34a" stroke-width="1.5"/>
  <text x="295" y="696" font-size="10" fill="#334155">Cas d'utilisation Client</text>
  <ellipse cx="505" cy="668" rx="30" ry="10" fill="#fef2f2" stroke="#ef4444" stroke-width="1.5"/>
  <text x="545" y="672" font-size="10" fill="#334155">Cas d'utilisation Admin</text>
  <line x1="505" y1="686" x2="535" y2="686" stroke="#64748b" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="545" y="690" font-size="10" fill="#334155">Relation «extends»</text>

</svg>
