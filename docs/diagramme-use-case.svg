<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1300 980" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="arr"     markerWidth="10" markerHeight="7" refX="9"  refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#64748b"/></marker>
    <marker id="arr-inc" markerWidth="10" markerHeight="7" refX="9"  refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#2563eb"/></marker>
    <marker id="arr-ext" markerWidth="10" markerHeight="7" refX="9"  refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#b45309"/></marker>
  </defs>

  <rect width="1300" height="980" fill="#f8fafc"/>
  <text x="650" y="36" text-anchor="middle" font-size="20" font-weight="bold" fill="#0f172a">Diagramme de Cas d'Utilisation — BookStore App</text>
  <text x="650" y="56" text-anchor="middle" font-size="12" fill="#64748b">Acteurs : Visiteur · Client connecté · Administrateur</text>
  <line x1="60" y1="66" x2="1240" y2="66" stroke="#cbd5e1" stroke-width="1.5"/>

  <!-- SYSTEM BOUNDARY -->
  <rect x="170" y="78" width="960" height="880" rx="16" fill="none" stroke="#cbd5e1" stroke-width="2" stroke-dasharray="8,4"/>
  <text x="650" y="100" text-anchor="middle" font-size="13" font-weight="bold" fill="#475569">Système BookStore</text>

  <!-- ACTOR VISITEUR -->
  <circle cx="65" cy="220" r="18" fill="none" stroke="#64748b" stroke-width="2"/>
  <line x1="65" y1="238" x2="65" y2="290" stroke="#64748b" stroke-width="2"/>
  <line x1="35" y1="258" x2="95" y2="258" stroke="#64748b" stroke-width="2"/>
  <line x1="65" y1="290" x2="40" y2="325" stroke="#64748b" stroke-width="2"/>
  <line x1="65" y1="290" x2="90" y2="325" stroke="#64748b" stroke-width="2"/>
  <text x="65" y="342" text-anchor="middle" font-size="12" font-weight="bold" fill="#334155">Visiteur</text>
  <text x="65" y="357" text-anchor="middle" font-size="10" fill="#64748b">(non connecté)</text>

  <!-- ACTOR CLIENT -->
  <circle cx="65" cy="600" r="18" fill="none" stroke="#2563eb" stroke-width="2"/>
  <line x1="65" y1="618" x2="65" y2="670" stroke="#2563eb" stroke-width="2"/>
  <line x1="35" y1="638" x2="95" y2="638" stroke="#2563eb" stroke-width="2"/>
  <line x1="65" y1="670" x2="40" y2="705" stroke="#2563eb" stroke-width="2"/>
  <line x1="65" y1="670" x2="90" y2="705" stroke="#2563eb" stroke-width="2"/>
  <text x="65" y="722" text-anchor="middle" font-size="12" font-weight="bold" fill="#1d4ed8">Client</text>
  <text x="65" y="737" text-anchor="middle" font-size="10" fill="#2563eb">(connecté)</text>

  <!-- ACTOR ADMIN -->
  <circle cx="1235" cy="500" r="18" fill="none" stroke="#b45309" stroke-width="2"/>
  <line x1="1235" y1="518" x2="1235" y2="570" stroke="#b45309" stroke-width="2"/>
  <line x1="1205" y1="538" x2="1265" y2="538" stroke="#b45309" stroke-width="2"/>
  <line x1="1235" y1="570" x2="1210" y2="605" stroke="#b45309" stroke-width="2"/>
  <line x1="1235" y1="570" x2="1260" y2="605" stroke="#b45309" stroke-width="2"/>
  <text x="1235" y="622" text-anchor="middle" font-size="12" font-weight="bold" fill="#92400e">Admin</text>
  <text x="1235" y="637" text-anchor="middle" font-size="10" fill="#b45309">(ROLE_ADMIN)</text>

  <!-- ZONE PUBLIQUE -->
  <rect x="188" y="112" width="400" height="360" rx="12" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.2"/>
  <text x="388" y="132" text-anchor="middle" font-size="10" font-weight="bold" fill="#475569">Fonctionnalités publiques</text>

  <ellipse cx="388" cy="160" rx="155" ry="20" fill="#fff" stroke="#94a3b8" stroke-width="1.2"/>
  <text x="388" y="164" text-anchor="middle" font-size="10" fill="#1e293b">Parcourir le catalogue</text>
  <ellipse cx="388" cy="206" rx="155" ry="20" fill="#fff" stroke="#94a3b8" stroke-width="1.2"/>
  <text x="388" y="210" text-anchor="middle" font-size="10" fill="#1e293b">Rechercher / filtrer les livres</text>
  <ellipse cx="388" cy="252" rx="155" ry="20" fill="#fff" stroke="#94a3b8" stroke-width="1.2"/>
  <text x="388" y="256" text-anchor="middle" font-size="10" fill="#1e293b">Voir détails d'un livre</text>
  <ellipse cx="388" cy="298" rx="155" ry="20" fill="#fff" stroke="#94a3b8" stroke-width="1.2"/>
  <text x="388" y="302" text-anchor="middle" font-size="10" fill="#1e293b">Ajouter au panier (localStorage)</text>
  <ellipse cx="388" cy="344" rx="155" ry="20" fill="#fff" stroke="#94a3b8" stroke-width="1.2"/>
  <text x="388" y="348" text-anchor="middle" font-size="10" fill="#1e293b">S'inscrire (Register)</text>
  <ellipse cx="388" cy="390" rx="155" ry="20" fill="#fff" stroke="#94a3b8" stroke-width="1.2"/>
  <text x="388" y="394" text-anchor="middle" font-size="10" fill="#1e293b">Se connecter (Login JWT)</text>
  <ellipse cx="388" cy="436" rx="155" ry="20" fill="#fff" stroke="#94a3b8" stroke-width="1.2"/>
  <text x="388" y="440" text-anchor="middle" font-size="10" fill="#1e293b">Changer langue (FR/EN) + thème</text>

  <!-- ZONE CLIENT -->
  <rect x="188" y="490" width="400" height="444" rx="12" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.2"/>
  <text x="388" y="510" text-anchor="middle" font-size="10" font-weight="bold" fill="#1d4ed8">Fonctionnalités client connecté</text>

  <ellipse cx="388" cy="536" rx="155" ry="20" fill="#fff" stroke="#3b82f6" stroke-width="1.2"/>
  <text x="388" y="540" text-anchor="middle" font-size="10" fill="#1e3a5f">Passer une commande (COD)</text>
  <ellipse cx="388" cy="582" rx="155" ry="20" fill="#fff" stroke="#3b82f6" stroke-width="1.2"/>
  <text x="388" y="586" text-anchor="middle" font-size="10" fill="#1e3a5f">Voir mes commandes</text>
  <ellipse cx="388" cy="628" rx="155" ry="20" fill="#fff" stroke="#3b82f6" stroke-width="1.2"/>
  <text x="388" y="632" text-anchor="middle" font-size="10" fill="#1e3a5f">Suivre ma commande (stepper)</text>
  <ellipse cx="388" cy="674" rx="155" ry="20" fill="#fff" stroke="#3b82f6" stroke-width="1.2"/>
  <text x="388" y="678" text-anchor="middle" font-size="10" fill="#1e3a5f">Recevoir email confirmation / statut</text>
  <ellipse cx="388" cy="720" rx="155" ry="20" fill="#fff" stroke="#3b82f6" stroke-width="1.2"/>
  <text x="388" y="724" text-anchor="middle" font-size="10" fill="#1e3a5f">Donner un avis (note + commentaire)</text>
  <ellipse cx="388" cy="766" rx="155" ry="20" fill="#fff" stroke="#3b82f6" stroke-width="1.2"/>
  <text x="388" y="770" text-anchor="middle" font-size="10" fill="#1e3a5f">Gérer mon profil (adresses…)</text>
  <ellipse cx="388" cy="812" rx="155" ry="20" fill="#fff" stroke="#3b82f6" stroke-width="1.2"/>
  <text x="388" y="816" text-anchor="middle" font-size="10" fill="#1e3a5f">Voir recommandations IA</text>
  <ellipse cx="388" cy="858" rx="155" ry="20" fill="#fff" stroke="#3b82f6" stroke-width="1.2"/>
  <text x="388" y="862" text-anchor="middle" font-size="10" fill="#1e3a5f">Utiliser le chatbot (Gemini AI)</text>
  <ellipse cx="388" cy="904" rx="155" ry="20" fill="#fff" stroke="#3b82f6" stroke-width="1.2"/>
  <text x="388" y="908" text-anchor="middle" font-size="10" fill="#1e3a5f">Voir N° suivi Chronopost</text>

  <!-- ZONE ADMIN -->
  <rect x="660" y="112" width="460" height="840" rx="12" fill="#fffbeb" stroke="#fde68a" stroke-width="1.2"/>
  <text x="890" y="132" text-anchor="middle" font-size="10" font-weight="bold" fill="#92400e">Fonctionnalités administrateur</text>

  <ellipse cx="890" cy="162" rx="175" ry="20" fill="#fff" stroke="#d97706" stroke-width="1.2"/>
  <text x="890" y="166" text-anchor="middle" font-size="10" fill="#78350f">Tableau de bord (KPIs / stats)</text>
  <ellipse cx="890" cy="210" rx="175" ry="20" fill="#fff" stroke="#d97706" stroke-width="1.2"/>
  <text x="890" y="214" text-anchor="middle" font-size="10" fill="#78350f">Gérer les livres (CRUD complet)</text>
  <ellipse cx="890" cy="258" rx="175" ry="20" fill="#fff" stroke="#d97706" stroke-width="1.2"/>
  <text x="890" y="262" text-anchor="middle" font-size="10" fill="#78350f">Gérer le stock (RESTOCK / CORRECTION)</text>
  <ellipse cx="890" cy="306" rx="175" ry="20" fill="#fff" stroke="#d97706" stroke-width="1.2"/>
  <text x="890" y="310" text-anchor="middle" font-size="10" fill="#78350f">Voir historique mouvements stock</text>
  <ellipse cx="890" cy="354" rx="175" ry="20" fill="#fff" stroke="#d97706" stroke-width="1.2"/>
  <text x="890" y="358" text-anchor="middle" font-size="10" fill="#78350f">Gérer les commandes (liste + filtres)</text>
  <ellipse cx="890" cy="402" rx="175" ry="20" fill="#fff" stroke="#d97706" stroke-width="1.2"/>
  <text x="890" y="406" text-anchor="middle" font-size="10" fill="#78350f">Modifier statut commande</text>
  <ellipse cx="890" cy="450" rx="175" ry="20" fill="#fff" stroke="#d97706" stroke-width="1.2"/>
  <text x="890" y="454" text-anchor="middle" font-size="10" fill="#78350f">Générer N° suivi Chronopost (auto)</text>
  <ellipse cx="890" cy="498" rx="175" ry="20" fill="#fff" stroke="#d97706" stroke-width="1.2"/>
  <text x="890" y="502" text-anchor="middle" font-size="10" fill="#78350f">Envoyer email statut au client</text>
  <ellipse cx="890" cy="546" rx="175" ry="20" fill="#fff" stroke="#d97706" stroke-width="1.2"/>
  <text x="890" y="550" text-anchor="middle" font-size="10" fill="#78350f">Filtrer commandes par statut</text>
  <ellipse cx="890" cy="594" rx="175" ry="20" fill="#fff" stroke="#d97706" stroke-width="1.2"/>
  <text x="890" y="598" text-anchor="middle" font-size="10" fill="#78350f">Exporter commandes (CSV / PDF)</text>
  <ellipse cx="890" cy="642" rx="175" ry="20" fill="#fff" stroke="#d97706" stroke-width="1.2"/>
  <text x="890" y="646" text-anchor="middle" font-size="10" fill="#78350f">Gérer les utilisateurs</text>
  <ellipse cx="890" cy="690" rx="175" ry="20" fill="#fff" stroke="#d97706" stroke-width="1.2"/>
  <text x="890" y="694" text-anchor="middle" font-size="10" fill="#78350f">Modérer les avis clients</text>
  <ellipse cx="890" cy="738" rx="175" ry="20" fill="#fff" stroke="#d97706" stroke-width="1.2"/>
  <text x="890" y="742" text-anchor="middle" font-size="10" fill="#78350f">Voir alertes stock bas</text>
  <ellipse cx="890" cy="786" rx="175" ry="20" fill="#fff" stroke="#d97706" stroke-width="1.2"/>
  <text x="890" y="790" text-anchor="middle" font-size="10" fill="#78350f">Basculer dark / light mode</text>
  <ellipse cx="890" cy="834" rx="175" ry="20" fill="#fff" stroke="#d97706" stroke-width="1.2"/>
  <text x="890" y="838" text-anchor="middle" font-size="10" fill="#78350f">Changer langue (FR / EN)</text>
  <ellipse cx="890" cy="882" rx="175" ry="20" fill="#fff" stroke="#d97706" stroke-width="1.2"/>
  <text x="890" y="886" text-anchor="middle" font-size="10" fill="#78350f">Appliquer remises (discount)</text>

  <!-- INCLUDE / EXTEND -->
  <line x1="543" y1="540" x2="715" y2="450" stroke="#2563eb80" stroke-width="1" stroke-dasharray="5,3" marker-end="url(#arr-inc)"/>
  <text x="634" y="490" font-size="8" fill="#2563eb" text-anchor="middle">«include»</text>
  <line x1="543" y1="545" x2="715" y2="498" stroke="#2563eb80" stroke-width="1" stroke-dasharray="5,3" marker-end="url(#arr-inc)"/>
  <text x="634" y="517" font-size="8" fill="#2563eb" text-anchor="middle">«include»</text>
  <line x1="890" y1="412" x2="890" y2="430" stroke="#b45309" stroke-width="1" stroke-dasharray="5,3" marker-end="url(#arr-ext)"/>
  <text x="902" y="423" font-size="8" fill="#b45309">«extend» si EXPEDIEE</text>

