<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 920" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#64748b"/></marker>
    <marker id="arr-inc" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#3b82f6"/></marker>
    <marker id="arr-ext" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#f59e0b"/></marker>
  </defs>

  <rect width="1200" height="920" fill="#0f1117"/>
  <text x="600" y="36" text-anchor="middle" font-size="20" font-weight="bold" fill="#f1f5f9">Diagramme de Cas d'Utilisation — BookStore App</text>
  <text x="600" y="56" text-anchor="middle" font-size="12" fill="#64748b">Acteurs : Visiteur · Client connecté · Administrateur</text>
  <line x1="80" y1="66" x2="1120" y2="66" stroke="#ffffff15" stroke-width="1"/>

  <!-- ══ SYSTEM BOUNDARY ══ -->
  <rect x="160" y="78" width="870" height="820" rx="16" fill="none" stroke="#ffffff20" stroke-width="1.5" stroke-dasharray="8,4"/>
  <text x="595" y="100" text-anchor="middle" font-size="13" font-weight="bold" fill="#475569">Système BookStore</text>

  <!-- ══ ACTOR: VISITEUR ══ -->
  <!-- Head -->
  <circle cx="60" cy="240" r="18" fill="none" stroke="#94a3b8" stroke-width="2"/>
  <!-- Body -->
  <line x1="60" y1="258" x2="60" y2="310" stroke="#94a3b8" stroke-width="2"/>
  <!-- Arms -->
  <line x1="30" y1="278" x2="90" y2="278" stroke="#94a3b8" stroke-width="2"/>
  <!-- Legs -->
  <line x1="60" y1="310" x2="35" y2="345" stroke="#94a3b8" stroke-width="2"/>
  <line x1="60" y1="310" x2="85" y2="345" stroke="#94a3b8" stroke-width="2"/>
  <text x="60" y="362" text-anchor="middle" font-size="12" font-weight="bold" fill="#94a3b8">Visiteur</text>
  <text x="60" y="377" text-anchor="middle" font-size="10" fill="#64748b">(non connecté)</text>

  <!-- ══ ACTOR: CLIENT ══ -->
  <circle cx="60" cy="560" r="18" fill="none" stroke="#3b82f6" stroke-width="2"/>
  <line x1="60" y1="578" x2="60" y2="630" stroke="#3b82f6" stroke-width="2"/>
  <line x1="30" y1="598" x2="90" y2="598" stroke="#3b82f6" stroke-width="2"/>
  <line x1="60" y1="630" x2="35" y2="665" stroke="#3b82f6" stroke-width="2"/>
  <line x1="60" y1="630" x2="85" y2="665" stroke="#3b82f6" stroke-width="2"/>
  <text x="60" y="682" text-anchor="middle" font-size="12" font-weight="bold" fill="#3b82f6">Client</text>
  <text x="60" y="697" text-anchor="middle" font-size="10" fill="#60a5fa">(connecté)</text>

  <!-- ══ ACTOR: ADMIN ══ -->
  <circle cx="1140" cy="480" r="18" fill="none" stroke="#f59e0b" stroke-width="2"/>
  <line x1="1140" y1="498" x2="1140" y2="550" stroke="#f59e0b" stroke-width="2"/>
  <line x1="1110" y1="518" x2="1170" y2="518" stroke="#f59e0b" stroke-width="2"/>
  <line x1="1140" y1="550" x2="1115" y2="585" stroke="#f59e0b" stroke-width="2"/>
  <line x1="1140" y1="550" x2="1165" y2="585" stroke="#f59e0b" stroke-width="2"/>
  <text x="1140" y="602" text-anchor="middle" font-size="12" font-weight="bold" fill="#f59e0b">Admin</text>
  <text x="1140" y="617" text-anchor="middle" font-size="10" fill="#fbbf24">(ROLE_ADMIN)</text>

  <!-- ══ ZONE VISITEUR ══ -->
  <rect x="178" y="110" width="380" height="320" rx="12" fill="#1e293b60" stroke="#94a3b840" stroke-width="1"/>
  <text x="368" y="130" text-anchor="middle" font-size="10" font-weight="bold" fill="#64748b">Fonctionnalités publiques</text>

  <!-- Use cases visiteur -->
  <ellipse cx="368" cy="160" rx="145" ry="20" fill="#1e293b" stroke="#94a3b8" stroke-width="1.2"/>
  <text x="368" y="164" text-anchor="middle" font-size="10" fill="#e2e8f0">Parcourir le catalogue</text>

  <ellipse cx="368" cy="210" rx="145" ry="20" fill="#1e293b" stroke="#94a3b8" stroke-width="1.2"/>
  <text x="368" y="214" text-anchor="middle" font-size="10" fill="#e2e8f0">Rechercher un livre (filtre/catégorie)</text>

  <ellipse cx="368" cy="260" rx="145" ry="20" fill="#1e293b" stroke="#94a3b8" stroke-width="1.2"/>
  <text x="368" y="264" text-anchor="middle" font-size="10" fill="#e2e8f0">Voir détails d'un livre</text>

  <ellipse cx="368" cy="310" rx="145" ry="20" fill="#1e293b" stroke="#94a3b8" stroke-width="1.2"/>
  <text x="368" y="314" text-anchor="middle" font-size="10" fill="#e2e8f0">S'inscrire (Register)</text>

  <ellipse cx="368" cy="360" rx="145" ry="20" fill="#1e293b" stroke="#94a3b8" stroke-width="1.2"/>
  <text x="368" y="364" text-anchor="middle" font-size="10" fill="#e2e8f0">Se connecter (Login JWT)</text>

  <ellipse cx="368" cy="410" rx="145" ry="20" fill="#1e293b" stroke="#94a3b8" stroke-width="1.2"/>
  <text x="368" y="414" text-anchor="middle" font-size="10" fill="#e2e8f0">Ajouter au panier (localStorage)</text>

  <!-- ══ ZONE CLIENT ══ -->
  <rect x="178" y="450" width="380" height="400" rx="12" fill="#1e2d4060" stroke="#3b82f640" stroke-width="1"/>
  <text x="368" y="470" text-anchor="middle" font-size="10" font-weight="bold" fill="#3b82f6">Fonctionnalités client connecté</text>

  <ellipse cx="368" cy="498" rx="145" ry="20" fill="#1e293b" stroke="#3b82f6" stroke-width="1.2"/>
  <text x="368" y="502" text-anchor="middle" font-size="10" fill="#bfdbfe">Passer une commande (COD)</text>

  <ellipse cx="368" cy="548" rx="145" ry="20" fill="#1e293b" stroke="#3b82f6" stroke-width="1.2"/>
  <text x="368" y="552" text-anchor="middle" font-size="10" fill="#bfdbfe">Voir mes commandes</text>

  <ellipse cx="368" cy="598" rx="145" ry="20" fill="#1e293b" stroke="#3b82f6" stroke-width="1.2"/>
  <text x="368" y="602" text-anchor="middle" font-size="10" fill="#bfdbfe">Suivre ma commande (stepper)</text>

  <ellipse cx="368" cy="648" rx="145" ry="20" fill="#1e293b" stroke="#3b82f6" stroke-width="1.2"/>
  <text x="368" y="652" text-anchor="middle" font-size="10" fill="#bfdbfe">Recevoir email confirmation</text>

  <ellipse cx="368" cy="698" rx="145" ry="20" fill="#1e293b" stroke="#3b82f6" stroke-width="1.2"/>
  <text x="368" y="702" text-anchor="middle" font-size="10" fill="#bfdbfe">Donner un avis (note + commentaire)</text>

  <ellipse cx="368" cy="748" rx="145" ry="20" fill="#1e293b" stroke="#3b82f6" stroke-width="1.2"/>
  <text x="368" y="752" text-anchor="middle" font-size="10" fill="#bfdbfe">Gérer mon profil</text>

  <ellipse cx="368" cy="798" rx="145" ry="20" fill="#1e293b" stroke="#3b82f6" stroke-width="1.2"/>
  <text x="368" y="802" text-anchor="middle" font-size="10" fill="#bfdbfe">Changer langue / thème</text>

  <ellipse cx="368" cy="848" rx="145" ry="20" fill="#1e293b" stroke="#3b82f6" stroke-width="1.2"/>
  <text x="368" y="852" text-anchor="middle" font-size="10" fill="#bfdbfe">Voir recommandations IA</text>

  <!-- ══ ZONE ADMIN ══ -->
  <rect x="620" y="110" width="390" height="800" rx="12" fill="#1c1a1060" stroke="#f59e0b40" stroke-width="1"/>
  <text x="815" y="130" text-anchor="middle" font-size="10" font-weight="bold" fill="#f59e0b">Fonctionnalités administrateur</text>

  <ellipse cx="815" cy="158" rx="155" ry="20" fill="#1e293b" stroke="#f59e0b" stroke-width="1.2"/>
  <text x="815" y="162" text-anchor="middle" font-size="10" fill="#fde68a">Tableau de bord (KPIs / stats)</text>

  <ellipse cx="815" cy="210" rx="155" ry="20" fill="#1e293b" stroke="#f59e0b" stroke-width="1.2"/>
  <text x="815" y="214" text-anchor="middle" font-size="10" fill="#fde68a">Gérer les livres (CRUD)</text>

  <ellipse cx="815" cy="260" rx="155" ry="20" fill="#1e293b" stroke="#f59e0b" stroke-width="1.2"/>
  <text x="815" y="264" text-anchor="middle" font-size="10" fill="#fde68a">Gérer le stock (RESTOCK / CORRECTION)</text>

  <ellipse cx="815" cy="310" rx="155" ry="20" fill="#1e293b" stroke="#f59e0b" stroke-width="1.2"/>
  <text x="815" y="314" text-anchor="middle" font-size="10" fill="#fde68a">Voir historique mouvements stock</text>

  <ellipse cx="815" cy="360" rx="155" ry="20" fill="#1e293b" stroke="#f59e0b" stroke-width="1.2"/>
  <text x="815" y="364" text-anchor="middle" font-size="10" fill="#fde68a">Gérer les commandes</text>

  <ellipse cx="815" cy="410" rx="155" ry="20" fill="#1e293b" stroke="#f59e0b" stroke-width="1.2"/>
  <text x="815" y="414" text-anchor="middle" font-size="10" fill="#fde68a">Modifier statut commande</text>

  <ellipse cx="815" cy="460" rx="155" ry="20" fill="#1e293b" stroke="#f59e0b" stroke-width="1.2"/>
  <text x="815" y="464" text-anchor="middle" font-size="10" fill="#fde68a">Générer N° suivi Chronopost</text>

  <ellipse cx="815" cy="510" rx="155" ry="20" fill="#1e293b" stroke="#f59e0b" stroke-width="1.2"/>
  <text x="815" y="514" text-anchor="middle" font-size="10" fill="#fde68a">Envoyer email statut au client</text>

  <ellipse cx="815" cy="560" rx="155" ry="20" fill="#1e293b" stroke="#f59e0b" stroke-width="1.2"/>
  <text x="815" y="564" text-anchor="middle" font-size="10" fill="#fde68a">Filtrer commandes par statut</text>

  <ellipse cx="815" cy="610" rx="155" ry="20" fill="#1e293b" stroke="#f59e0b" stroke-width="1.2"/>
  <text x="815" y="614" text-anchor="middle" font-size="10" fill="#fde68a">Exporter commandes (CSV / PDF)</text>

  <ellipse cx="815" cy="660" rx="155" ry="20" fill="#1e293b" stroke="#f59e0b" stroke-width="1.2"/>
  <text x="815" y="664" text-anchor="middle" font-size="10" fill="#fde68a">Gérer les utilisateurs</text>

  <ellipse cx="815" cy="710" rx="155" ry="20" fill="#1e293b" stroke="#f59e0b" stroke-width="1.2"/>
  <text x="815" y="714" text-anchor="middle" font-size="10" fill="#fde68a">Modérer les avis clients</text>

  <ellipse cx="815" cy="760" rx="155" ry="20" fill="#1e293b" stroke="#f59e0b" stroke-width="1.2"/>
  <text x="815" y="764" text-anchor="middle" font-size="10" fill="#fde68a">Basculer mode sombre / clair</text>

  <ellipse cx="815" cy="810" rx="155" ry="20" fill="#1e293b" stroke="#f59e0b" stroke-width="1.2"/>
  <text x="815" y="814" text-anchor="middle" font-size="10" fill="#fde68a">Voir alertes stock bas</text>

  <ellipse cx="815" cy="860" rx="155" ry="20" fill="#1e293b" stroke="#f59e0b" stroke-width="1.2"/>
  <text x="815" y="864" text-anchor="middle" font-size="10" fill="#fde68a">Changer langue (FR / EN)</text>

  <!-- ══ INCLUDE / EXTEND relations ══ -->
  <!-- Passer commande includes: stock check, email -->
  <line x1="513" y1="498" x2="660" y2="460" stroke="#3b82f6" stroke-width="1" stroke-dasharray="5,3" marker-end="url(#arr-inc)"/>
  <text x="590" y="474" font-size="8" fill="#3b82f6" text-anchor="middle">«include»</text>

  <line x1="513" y1="498" x2="660" y2="510" stroke="#3b82f6" stroke-width="1" stroke-dasharray="5,3" marker-end="url(#arr-inc)"/>
  <text x="590" y="502" font-size="8" fill="#3b82f6" text-anchor="middle">«include»</text>

  <!-- Modifier statut extends: Générer Chronopost (si EXPEDIEE) -->
  <line x1="815" y1="420" x2="815" y2="440" stroke="#f59e0b" stroke-width="1" stroke-dasharray="5,3" marker-end="url(#arr-ext)"/>
  <text x="826" y="432" font-size="8" fill="#f59e0b">«extend»</text>

  <!-- Modifier statut includes: email -->
  <line x1="970" y1="410" x2="970" y2="510" stroke="#f59e0b" stroke-width="1" stroke-dasharray="5,3"/>
  <line x1="970" y1="510" x2="970" y2="510" stroke="#f59e0b" stroke-width="1" stroke-dasharray="5,3" marker-end="url(#arr-ext)"/>

  <!-- ══ ACTOR ASSOCIATIONS ══ -->
  <!-- Visiteur -> use cases publiques -->
  <line x1="78" y1="248" x2="222" y2="160" stroke="#94a3b8" stroke-width="1.2"/>
  <line x1="78" y1="258" x2="222" y2="210" stroke="#94a3b8" stroke-width="1.2"/>
  <line x1="78" y1="268" x2="222" y2="260" stroke="#94a3b8" stroke-width="1.2"/>
  <line x1="78" y1="280" x2="222" y2="310" stroke="#94a3b8" stroke-width="1.2"/>
  <line x1="78" y1="290" x2="222" y2="360" stroke="#94a3b8" stroke-width="1.2"/>
  <line x1="78" y1="300" x2="222" y2="410" stroke="#94a3b8" stroke-width="1.2"/>

  <!-- Client -> use cases client (+ héritage visiteur) -->
  <line x1="78" y1="568" x2="222" y2="498" stroke="#3b82f6" stroke-width="1.2"/>
  <line x1="78" y1="578" x2="222" y2="548" stroke="#3b82f6" stroke-width="1.2"/>
  <line x1="78" y1="588" x2="222" y2="598" stroke="#3b82f6" stroke-width="1.2"/>
  <line x1="78" y1="598" x2="222" y2="648" stroke="#3b82f6" stroke-width="1.2"/>
  <line x1="78" y1="608" x2="222" y2="698" stroke="#3b82f6" stroke-width="1.2"/>
  <line x1="78" y1="618" x2="222" y2="748" stroke="#3b82f6" stroke-width="1.2"/>
  <line x1="78" y1="628" x2="222" y2="798" stroke="#3b82f6" stroke-width="1.2"/>
  <line x1="78" y1="638" x2="222" y2="848" stroke="#3b82f6" stroke-width="1.2"/>

  <!-- Visiteur extends Client (inheritance) -->
  <line x1="60" y1="380" x2="60" y2="540" stroke="#64748b" stroke-width="1.5" stroke-dasharray="6,3"/>
  <polygon points="55,380,65,380,60,365" fill="none" stroke="#64748b" stroke-width="1.5"/>
  <text x="20" y="465" font-size="9" fill="#64748b" transform="rotate(-90,20,465)">hérite</text>

  <!-- Admin -> use cases admin -->
  <line x1="1122" y1="485" x2="970" y2="158" stroke="#f59e0b" stroke-width="1.2"/>
  <line x1="1122" y1="490" x2="970" y2="210" stroke="#f59e0b" stroke-width="1.2"/>
  <line x1="1122" y1="495" x2="970" y2="260" stroke="#f59e0b" stroke-width="1.2"/>
  <line x1="1122" y1="500" x2="970" y2="310" stroke="#f59e0b" stroke-width="1.2"/>
  <line x1="1122" y1="505" x2="970" y2="360" stroke="#f59e0b" stroke-width="1.2"/>
  <line x1="1122" y1="510" x2="970" y2="410" stroke="#f59e0b" stroke-width="1.2"/>
  <line x1="1122" y1="515" x2="970" y2="460" stroke="#f59e0b" stroke-width="1.2"/>
  <line x1="1122" y1="520" x2="970" y2="510" stroke="#f59e0b" stroke-width="1.2"/>
  <line x1="1122" y1="525" x2="970" y2="560" stroke="#f59e0b" stroke-width="1.2"/>
  <line x1="1122" y1="530" x2="970" y2="610" stroke="#f59e0b" stroke-width="1.2"/>
  <line x1="1122" y1="535" x2="970" y2="660" stroke="#f59e0b" stroke-width="1.2"/>
  <line x1="1122" y1="540" x2="970" y2="710" stroke="#f59e0b" stroke-width="1.2"/>
  <line x1="1122" y1="545" x2="970" y2="760" stroke="#f59e0b" stroke-width="1.2"/>
  <line x1="1122" y1="550" x2="970" y2="810" stroke="#f59e0b" stroke-width="1.2"/>
  <line x1="1122" y1="555" x2="970" y2="860" stroke="#f59e0b" stroke-width="1.2"/>

  <!-- ══ LEGEND ══ -->
  <rect x="182" y="876" width="420" height="34" rx="6" fill="#1e293b" stroke="#ffffff15" stroke-width="1"/>
  <line x1="200" y1="893" x2="230" y2="893" stroke="#3b82f6" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr-inc)"/>
  <text x="240" y="897" font-size="9" fill="#94a3b8">«include» (obligatoire)</text>
  <line x1="330" y1="893" x2="360" y2="893" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr-ext)"/>
  <text x="370" y="897" font-size="9" fill="#94a3b8">«extend» (conditionnel)</text>
  <line x1="470" y1="893" x2="500" y2="893" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="510" y="897" font-size="9" fill="#94a3b8">Association</text>
</svg>
