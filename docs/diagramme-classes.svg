<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#64748b"/></marker>
    <marker id="diamond" markerWidth="12" markerHeight="8" refX="0" refY="4" orient="auto"><polygon points="0 4,6 0,12 4,6 8" fill="#f59e0b"/></marker>
    <marker id="tri" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="none" stroke="#64748b" stroke-width="1"/></marker>
  </defs>
  <rect width="1200" height="900" fill="#0f1117"/>
  <text x="600" y="36" text-anchor="middle" font-size="20" font-weight="bold" fill="#f1f5f9">Diagramme de Classes — BookStore App</text>
  <text x="600" y="56" text-anchor="middle" font-size="12" fill="#64748b">Entités JPA / Hibernate · Spring Boot 3.2</text>
  <line x1="80" y1="66" x2="1120" y2="66" stroke="#ffffff15" stroke-width="1"/>

  <!-- ══ USER ══ -->
  <rect x="30" y="90" width="240" height="260" rx="10" fill="#1e293b" stroke="#3b82f6" stroke-width="1.5"/>
  <rect x="30" y="90" width="240" height="32" rx="10" fill="#1d4ed8"/>
  <rect x="30" y="108" width="240" height="14" fill="#1d4ed8"/>
  <text x="150" y="111" text-anchor="middle" font-size="13" font-weight="bold" fill="#fff">User</text>
  <line x1="30" y1="122" x2="270" y2="122" stroke="#3b82f640" stroke-width="1"/>
  <text x="46" y="140" font-size="10" fill="#94a3b8">- id : Long</text>
  <text x="46" y="156" font-size="10" fill="#94a3b8">- username : String  {unique}</text>
  <text x="46" y="172" font-size="10" fill="#94a3b8">- password : String  @JsonIgnore</text>
  <text x="46" y="188" font-size="10" fill="#94a3b8">- email : String  {unique}</text>
  <text x="46" y="204" font-size="10" fill="#94a3b8">- firstName : String</text>
  <text x="46" y="220" font-size="10" fill="#94a3b8">- lastName : String</text>
  <text x="46" y="236" font-size="10" fill="#94a3b8">- phoneNumber : String</text>
  <text x="46" y="252" font-size="10" fill="#94a3b8">- role : String  (USER / ADMIN)</text>
  <text x="46" y="268" font-size="10" fill="#94a3b8">- addresses : List&lt;String&gt;  @ElementCollection</text>
  <line x1="30" y1="278" x2="270" y2="278" stroke="#3b82f640" stroke-width="1"/>
  <text x="46" y="296" font-size="10" fill="#60a5fa">+ getUsername() : String</text>
  <text x="46" y="312" font-size="10" fill="#60a5fa">+ getEmail() : String</text>
  <text x="46" y="328" font-size="10" fill="#60a5fa">+ getRole() : String</text>

  <!-- ══ BOOK ══ -->
  <rect x="320" y="90" width="260" height="388" rx="10" fill="#1e293b" stroke="#10b981" stroke-width="1.5"/>
  <rect x="320" y="90" width="260" height="32" rx="10" fill="#065f46"/>
  <rect x="320" y="108" width="260" height="14" fill="#065f46"/>
  <text x="450" y="111" text-anchor="middle" font-size="13" font-weight="bold" fill="#fff">Book</text>
  <line x1="320" y1="122" x2="580" y2="122" stroke="#10b98140" stroke-width="1"/>
  <text x="336" y="140" font-size="10" fill="#94a3b8">- id : Long</text>
  <text x="336" y="156" font-size="10" fill="#94a3b8">- title : String  {not null}</text>
  <text x="336" y="172" font-size="10" fill="#94a3b8">- author : List&lt;String&gt;  @ElementCollection</text>
  <text x="336" y="188" font-size="10" fill="#94a3b8">- description : String  @Column(TEXT)</text>
  <text x="336" y="204" font-size="10" fill="#94a3b8">- price : Double  {not null}</text>
  <text x="336" y="220" font-size="10" fill="#94a3b8">- imageUrl : String</text>
  <text x="336" y="236" font-size="10" fill="#94a3b8">- category : String</text>
  <text x="336" y="252" font-size="10" fill="#94a3b8">- isbn : String  {unique}</text>
  <text x="336" y="268" font-size="10" fill="#94a3b8">- publisher : String</text>
  <text x="336" y="284" font-size="10" fill="#94a3b8">- publishedYear : Integer</text>
  <text x="336" y="300" font-size="10" fill="#94a3b8">- pages : Integer</text>
  <text x="336" y="316" font-size="10" fill="#94a3b8">- language : String  = "Français"</text>
  <text x="336" y="332" font-size="10" fill="#94a3b8">- rating : Double  = 0.0</text>
  <text x="336" y="348" font-size="10" fill="#94a3b8">- reviewCount : Integer  = 0</text>
  <text x="336" y="364" font-size="10" fill="#94a3b8">- quantity : Integer  (stock)</text>
  <text x="336" y="380" font-size="10" fill="#94a3b8">- soldCount : Integer</text>
  <text x="336" y="396" font-size="10" fill="#94a3b8">- status : BookStatus  (AVAILABLE/OUT_OF_STOCK)</text>
  <text x="336" y="412" font-size="10" fill="#94a3b8">- featured : Boolean</text>
  <text x="336" y="428" font-size="10" fill="#94a3b8">- discount : Double  · stockAlert : Integer</text>
  <line x1="320" y1="438" x2="580" y2="438" stroke="#10b98140" stroke-width="1"/>
  <text x="336" y="456" font-size="10" fill="#6ee7b7">+ getFinalPrice() : Double</text>
  <text x="336" y="472" font-size="10" fill="#6ee7b7">enum BookStatus { AVAILABLE, OUT_OF_STOCK }</text>

  <!-- ══ ORDER ══ -->
  <rect x="640" y="90" width="260" height="296" rx="10" fill="#1e293b" stroke="#f59e0b" stroke-width="1.5"/>
  <rect x="640" y="90" width="260" height="32" rx="10" fill="#92400e"/>
  <rect x="640" y="108" width="260" height="14" fill="#92400e"/>
  <text x="770" y="111" text-anchor="middle" font-size="13" font-weight="bold" fill="#fff">Order</text>
  <line x1="640" y1="122" x2="900" y2="122" stroke="#f59e0b40" stroke-width="1"/>
  <text x="656" y="140" font-size="10" fill="#94a3b8">- id : Long</text>
  <text x="656" y="156" font-size="10" fill="#94a3b8">- orderDate : LocalDateTime</text>
  <text x="656" y="172" font-size="10" fill="#94a3b8">- status : String  (EN_PREPARATION / EXPEDIEE</text>
  <text x="656" y="186" font-size="10" fill="#94a3b8">                   LIVREE / ANNULEE)</text>
  <text x="656" y="202" font-size="10" fill="#94a3b8">- totalAmount : double</text>
  <text x="656" y="218" font-size="10" fill="#94a3b8">- shippingAddress : String</text>
  <text x="656" y="234" font-size="10" fill="#94a3b8">- paymentMethod : String  = "COD"</text>
  <text x="656" y="250" font-size="10" fill="#94a3b8">- trackingNumber : String  (Chronopost)</text>
  <text x="656" y="266" font-size="10" fill="#94a3b8">- user : User  @ManyToOne</text>
  <text x="656" y="282" font-size="10" fill="#94a3b8">- items : List&lt;OrderItem&gt;  @OneToMany EAGER</text>
  <line x1="640" y1="294" x2="900" y2="294" stroke="#f59e0b40" stroke-width="1"/>
  <text x="656" y="312" font-size="10" fill="#fbbf24">+ getUsername() : String</text>
  <text x="656" y="328" font-size="10" fill="#fbbf24">+ getStatus() : String</text>
  <text x="656" y="344" font-size="10" fill="#fbbf24">+ getTrackingNumber() : String</text>
  <text x="656" y="360" font-size="10" fill="#fbbf24">Zone: Europe/Paris · @Transactional</text>

  <!-- ══ ORDER ITEM ══ -->
  <rect x="960" y="90" width="220" height="220" rx="10" fill="#1e293b" stroke="#f59e0b" stroke-width="1.2"/>
  <rect x="960" y="90" width="220" height="32" rx="10" fill="#78350f"/>
  <rect x="960" y="108" width="220" height="14" fill="#78350f"/>
  <text x="1070" y="111" text-anchor="middle" font-size="13" font-weight="bold" fill="#fff">OrderItem</text>
  <line x1="960" y1="122" x2="1180" y2="122" stroke="#f59e0b40" stroke-width="1"/>
  <text x="976" y="140" font-size="10" fill="#94a3b8">- id : Long</text>
  <text x="976" y="156" font-size="10" fill="#94a3b8">- order : Order  @ManyToOne @JsonIgnore</text>
  <text x="976" y="172" font-size="10" fill="#94a3b8">- book : Book  @ManyToOne EAGER</text>
  <text x="976" y="188" font-size="10" fill="#94a3b8">- quantity : Integer  {not null}</text>
  <text x="976" y="204" font-size="10" fill="#94a3b8">- price : Double  {not null}</text>
  <line x1="960" y1="216" x2="1180" y2="216" stroke="#f59e0b40" stroke-width="1"/>
  <text x="976" y="234" font-size="10" fill="#fbbf24">+ getBook() : Book</text>
  <text x="976" y="250" font-size="10" fill="#fbbf24">+ getQuantity() : Integer</text>
  <text x="976" y="266" font-size="10" fill="#fbbf24">+ getPrice() : Double</text>
  <text x="976" y="284" font-size="10" fill="#f59e0b90">cascade = ALL · orphanRemoval</text>
  <text x="976" y="300" font-size="10" fill="#f59e0b90">fetch = LAZY (order) / EAGER (book)</text>

  <!-- ══ REVIEW ══ -->
  <rect x="30" y="400" width="240" height="200" rx="10" fill="#1e293b" stroke="#8b5cf6" stroke-width="1.5"/>
  <rect x="30" y="400" width="240" height="32" rx="10" fill="#4c1d95"/>
  <rect x="30" y="418" width="240" height="14" fill="#4c1d95"/>
  <text x="150" y="421" text-anchor="middle" font-size="13" font-weight="bold" fill="#fff">Review</text>
  <line x1="30" y1="432" x2="270" y2="432" stroke="#8b5cf640" stroke-width="1"/>
  <text x="46" y="450" font-size="10" fill="#94a3b8">- id : Long</text>
  <text x="46" y="466" font-size="10" fill="#94a3b8">- rating : int  (1 à 5)</text>
  <text x="46" y="482" font-size="10" fill="#94a3b8">- comment : String</text>
  <text x="46" y="498" font-size="10" fill="#94a3b8">- book : Book  @ManyToOne</text>
  <text x="46" y="514" font-size="10" fill="#94a3b8">- user : User  @ManyToOne</text>
  <line x1="30" y1="526" x2="270" y2="526" stroke="#8b5cf640" stroke-width="1"/>
  <text x="46" y="544" font-size="10" fill="#a78bfa">+ getRating() : int</text>
  <text x="46" y="560" font-size="10" fill="#a78bfa">+ getComment() : String</text>
  <text x="46" y="576" font-size="10" fill="#a78bfa">+ getBook() : Book</text>

  <!-- ══ STOCK MOVEMENT ══ -->
  <rect x="320" y="530" width="260" height="310" rx="10" fill="#1e293b" stroke="#ef4444" stroke-width="1.5"/>
  <rect x="320" y="530" width="260" height="32" rx="10" fill="#7f1d1d"/>
  <rect x="320" y="548" width="260" height="14" fill="#7f1d1d"/>
  <text x="450" y="551" text-anchor="middle" font-size="13" font-weight="bold" fill="#fff">StockMovement</text>
  <line x1="320" y1="562" x2="580" y2="562" stroke="#ef444440" stroke-width="1"/>
  <text x="336" y="580" font-size="10" fill="#94a3b8">- id : Long</text>
  <text x="336" y="596" font-size="10" fill="#94a3b8">- book : Book  @ManyToOne EAGER</text>
  <text x="336" y="612" font-size="10" fill="#94a3b8">- type : MovementType</text>
  <text x="336" y="628" font-size="10" fill="#94a3b8">- quantity : Integer  {not null}</text>
  <text x="336" y="644" font-size="10" fill="#94a3b8">- stockBefore : Integer</text>
  <text x="336" y="660" font-size="10" fill="#94a3b8">- stockAfter : Integer</text>
  <text x="336" y="676" font-size="10" fill="#94a3b8">- reason : String  @Column(TEXT)</text>
  <text x="336" y="692" font-size="10" fill="#94a3b8">- performedBy : String</text>
  <text x="336" y="708" font-size="10" fill="#94a3b8">- orderId : Long</text>
  <text x="336" y="724" font-size="10" fill="#94a3b8">- createdAt : LocalDateTime  @PrePersist</text>
  <line x1="320" y1="736" x2="580" y2="736" stroke="#ef444440" stroke-width="1"/>
  <text x="336" y="754" font-size="10" fill="#fca5a5">enum MovementType {</text>
  <text x="336" y="770" font-size="10" fill="#fca5a5">  RESTOCK, SALE, RETURN,</text>
  <text x="336" y="786" font-size="10" fill="#fca5a5">  CORRECTION, LOSS, INITIAL }</text>
  <text x="336" y="804" font-size="10" fill="#ef444490">table: stock_movements</text>
  <text x="336" y="820" font-size="10" fill="#ef444490">@JsonIgnoreProperties (author, desc…)</text>

  <!-- ══ LEGEND ══ -->
  <rect x="640" y="430" width="300" height="130" rx="8" fill="#1e293b" stroke="#ffffff20" stroke-width="1"/>
  <text x="790" y="450" text-anchor="middle" font-size="11" font-weight="bold" fill="#94a3b8">Légende des relations</text>
  <line x1="660" y1="468" x2="710" y2="468" stroke="#f59e0b" stroke-width="2" marker-end="url(#diamond)"/>
  <text x="720" y="472" font-size="10" fill="#94a3b8">Composition (@OneToMany)</text>
  <line x1="660" y1="490" x2="710" y2="490" stroke="#64748b" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr)"/>
  <text x="720" y="494" font-size="10" fill="#94a3b8">Association (@ManyToOne)</text>
  <line x1="660" y1="512" x2="710" y2="512" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="720" y="516" font-size="10" fill="#94a3b8">Référence bidirectionnelle</text>
  <text x="660" y="540" font-size="10" fill="#64748b">Toutes entités annotées @Entity + Lombok @Data</text>
  <text x="660" y="556" font-size="10" fill="#64748b">@GeneratedValue(IDENTITY) sur tous les id</text>

  <!-- ══ RELATIONS ══ -->
  <!-- Order -> User (ManyToOne) -->
  <line x1="640" y1="200" x2="270" y2="200" stroke="#64748b" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr)"/>
  <text x="440" y="193" text-anchor="middle" font-size="9" fill="#94a3b8">ManyToOne</text>
  <text x="440" y="207" text-anchor="middle" font-size="9" fill="#94a3b8">N commandes → 1 user</text>

  <!-- Order -> OrderItem (OneToMany) -->
  <line x1="900" y1="200" x2="960" y2="200" stroke="#f59e0b" stroke-width="2" marker-end="url(#diamond)"/>
  <text x="932" y="193" text-anchor="middle" font-size="9" fill="#fbbf24">1:N</text>

  <!-- OrderItem -> Book (ManyToOne) -->
  <line x1="1070" y1="310" x2="1070" y2="380" stroke="#64748b" stroke-width="1.5" stroke-dasharray="5,3"/>
  <line x1="1070" y1="380" x2="580" y2="380" stroke="#64748b" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr)"/>
  <text x="820" y="373" text-anchor="middle" font-size="9" fill="#94a3b8">ManyToOne (book)</text>

  <!-- Review -> Book (ManyToOne) -->
  <line x1="270" y1="490" x2="320" y2="350" stroke="#8b5cf6" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr)"/>
  <text x="282" y="415" font-size="9" fill="#a78bfa">ManyToOne</text>

  <!-- Review -> User (ManyToOne) -->
  <line x1="150" y1="400" x2="150" y2="350" stroke="#8b5cf6" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr)"/>
  <text x="158" y="378" font-size="9" fill="#a78bfa">ManyToOne</text>

  <!-- StockMovement -> Book -->
  <line x1="450" y1="530" x2="450" y2="480" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr)"/>
  <text x="458" y="506" font-size="9" fill="#fca5a5">ManyToOne</text>
</svg>
