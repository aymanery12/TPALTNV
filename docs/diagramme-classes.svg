<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1300 960" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#64748b"/></marker>
    <marker id="diamond" markerWidth="14" markerHeight="9" refX="1" refY="4.5" orient="auto"><polygon points="0 4.5,7 0,14 4.5,7 9" fill="none" stroke="#d97706" stroke-width="1.5"/></marker>
  </defs>

  <rect width="1300" height="960" fill="#f8fafc"/>
  <text x="650" y="36" text-anchor="middle" font-size="20" font-weight="bold" fill="#0f172a">Diagramme de Classes — BookStore App</text>
  <text x="650" y="56" text-anchor="middle" font-size="12" fill="#64748b">Entités JPA / Hibernate · Spring Boot 3.2</text>
  <line x1="60" y1="66" x2="1240" y2="66" stroke="#cbd5e1" stroke-width="1.5"/>

  <!-- ══ USER ══ -->
  <rect x="30" y="82" width="250" height="278" rx="10" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.8"/>
  <rect x="30" y="82" width="250" height="32" rx="10" fill="#2563eb"/>
  <rect x="30" y="100" width="250" height="14" fill="#2563eb"/>
  <text x="155" y="103" text-anchor="middle" font-size="13" font-weight="bold" fill="#fff">User</text>
  <line x1="30" y1="114" x2="280" y2="114" stroke="#bfdbfe" stroke-width="1"/>
  <text x="46" y="132" font-size="10" fill="#1e3a5f">- id : Long  @Id @GeneratedValue</text>
  <text x="46" y="149" font-size="10" fill="#1e3a5f">- username : String  {unique, not null}</text>
  <text x="46" y="166" font-size="10" fill="#1e3a5f">- password : String  @JsonIgnore</text>
  <text x="46" y="183" font-size="10" fill="#1e3a5f">- email : String  {unique}</text>
  <text x="46" y="200" font-size="10" fill="#1e3a5f">- firstName : String</text>
  <text x="46" y="217" font-size="10" fill="#1e3a5f">- lastName : String</text>
  <text x="46" y="234" font-size="10" fill="#1e3a5f">- phoneNumber : String</text>
  <text x="46" y="251" font-size="10" fill="#1e3a5f">- role : String  (USER | ADMIN)</text>
  <text x="46" y="268" font-size="10" fill="#1e3a5f">- addresses : List&lt;String&gt;  @ElementCollection</text>
  <line x1="30" y1="278" x2="280" y2="278" stroke="#bfdbfe" stroke-width="1"/>
  <text x="46" y="296" font-size="10" fill="#2563eb">+ getUsername() : String</text>
  <text x="46" y="312" font-size="10" fill="#2563eb">+ getEmail() : String</text>
  <text x="46" y="328" font-size="10" fill="#2563eb">+ getRole() : String</text>
  <text x="46" y="344" font-size="10" fill="#2563eb">+ getAddresses() : List&lt;String&gt;</text>

  <!-- ══ BOOK ══ -->
  <rect x="340" y="82" width="270" height="440" rx="10" fill="#f0fdf4" stroke="#16a34a" stroke-width="1.8"/>
  <rect x="340" y="82" width="270" height="32" rx="10" fill="#15803d"/>
  <rect x="340" y="100" width="270" height="14" fill="#15803d"/>
  <text x="475" y="103" text-anchor="middle" font-size="13" font-weight="bold" fill="#fff">Book</text>
  <line x1="340" y1="114" x2="610" y2="114" stroke="#bbf7d0" stroke-width="1"/>
  <text x="356" y="132" font-size="10" fill="#14532d">- id : Long</text>
  <text x="356" y="149" font-size="10" fill="#14532d">- title : String  {not null}</text>
  <text x="356" y="166" font-size="10" fill="#14532d">- author : List&lt;String&gt;  @ElementCollection EAGER</text>
  <text x="356" y="183" font-size="10" fill="#14532d">- description : String  @Column(TEXT)</text>
  <text x="356" y="200" font-size="10" fill="#14532d">- price : Double  {not null}</text>
  <text x="356" y="217" font-size="10" fill="#14532d">- imageUrl : String</text>
  <text x="356" y="234" font-size="10" fill="#14532d">- category : String</text>
  <text x="356" y="251" font-size="10" fill="#14532d">- isbn : String  {unique}</text>
  <text x="356" y="268" font-size="10" fill="#14532d">- publisher : String</text>
  <text x="356" y="285" font-size="10" fill="#14532d">- publishedYear : Integer</text>
  <text x="356" y="302" font-size="10" fill="#14532d">- pages : Integer</text>
  <text x="356" y="319" font-size="10" fill="#14532d">- language : String = "Français"</text>
  <text x="356" y="336" font-size="10" fill="#14532d">- rating : Double = 0.0</text>
  <text x="356" y="353" font-size="10" fill="#14532d">- reviewCount : Integer = 0</text>
  <text x="356" y="370" font-size="10" fill="#14532d">- quantity : Integer  (stock)</text>
  <text x="356" y="387" font-size="10" fill="#14532d">- soldCount : Integer</text>
  <text x="356" y="404" font-size="10" fill="#14532d">- status : BookStatus</text>
  <text x="356" y="421" font-size="10" fill="#14532d">- featured : Boolean</text>
  <text x="356" y="438" font-size="10" fill="#14532d">- discount : Double · stockAlert : Integer</text>
  <text x="356" y="455" font-size="10" fill="#14532d">- finalPrice : Double  (calculé)</text>
  <line x1="340" y1="466" x2="610" y2="466" stroke="#bbf7d0" stroke-width="1"/>
  <text x="356" y="484" font-size="10" fill="#15803d">+ getFinalPrice() : Double</text>
  <text x="356" y="500" font-size="10" fill="#15803d">enum BookStatus { AVAILABLE, OUT_OF_STOCK }</text>

  <!-- ══ ORDER ══ -->
  <rect x="680" y="82" width="270" height="320" rx="10" fill="#fffbeb" stroke="#d97706" stroke-width="1.8"/>
  <rect x="680" y="82" width="270" height="32" rx="10" fill="#b45309"/>
  <rect x="680" y="100" width="270" height="14" fill="#b45309"/>
  <text x="815" y="103" text-anchor="middle" font-size="13" font-weight="bold" fill="#fff">Order</text>
  <line x1="680" y1="114" x2="950" y2="114" stroke="#fde68a" stroke-width="1"/>
  <text x="696" y="132" font-size="10" fill="#78350f">- id : Long</text>
  <text x="696" y="149" font-size="10" fill="#78350f">- orderDate : LocalDateTime  (ZoneId Paris)</text>
  <text x="696" y="166" font-size="10" fill="#78350f">- status : String</text>
  <text x="696" y="180" font-size="10" fill="#92400e">  EN_PREPARATION | EXPEDIEE | LIVREE | ANNULEE</text>
  <text x="696" y="197" font-size="10" fill="#78350f">- totalAmount : double</text>
  <text x="696" y="214" font-size="10" fill="#78350f">- shippingAddress : String</text>
  <text x="696" y="231" font-size="10" fill="#78350f">- paymentMethod : String = "COD"</text>
  <text x="696" y="248" font-size="10" fill="#78350f">- trackingNumber : String  (Chronopost)</text>
  <text x="696" y="265" font-size="10" fill="#78350f">- user : User  @ManyToOne @JsonIgnoreProperties</text>
  <text x="696" y="282" font-size="10" fill="#78350f">- items : List&lt;OrderItem&gt;  @OneToMany EAGER</text>
  <text x="696" y="299" font-size="10" fill="#78350f">  cascade=ALL, orphanRemoval=true</text>
  <line x1="680" y1="312" x2="950" y2="312" stroke="#fde68a" stroke-width="1"/>
  <text x="696" y="330" font-size="10" fill="#b45309">+ getUsername() : String</text>
  <text x="696" y="347" font-size="10" fill="#b45309">+ getTrackingNumber() : String</text>
  <text x="696" y="364" font-size="10" fill="#b45309">+ getItems() : List&lt;OrderItem&gt;</text>
  <text x="696" y="381" font-size="10" fill="#92400e">table: orders · @Transactional(readOnly=true)</text>

  <!-- ══ ORDER ITEM ══ -->
  <rect x="1020" y="82" width="250" height="280" rx="10" fill="#fffbeb" stroke="#d97706" stroke-width="1.5"/>
  <rect x="1020" y="82" width="250" height="32" rx="10" fill="#92400e"/>
  <rect x="1020" y="100" width="250" height="14" fill="#92400e"/>
  <text x="1145" y="103" text-anchor="middle" font-size="13" font-weight="bold" fill="#fff">OrderItem</text>
  <line x1="1020" y1="114" x2="1270" y2="114" stroke="#fde68a" stroke-width="1"/>
  <text x="1036" y="132" font-size="10" fill="#78350f">- id : Long</text>
  <text x="1036" y="149" font-size="10" fill="#78350f">- order : Order  @ManyToOne LAZY @JsonIgnore</text>
  <text x="1036" y="166" font-size="10" fill="#78350f">- book : Book  @ManyToOne EAGER</text>
  <text x="1036" y="183" font-size="10" fill="#78350f">- quantity : Integer  {not null}</text>
  <text x="1036" y="200" font-size="10" fill="#78350f">- price : Double  {not null}</text>
  <line x1="1020" y1="212" x2="1270" y2="212" stroke="#fde68a" stroke-width="1"/>
  <text x="1036" y="230" font-size="10" fill="#b45309">+ getBook() : Book</text>
  <text x="1036" y="247" font-size="10" fill="#b45309">+ getQuantity() : Integer</text>
  <text x="1036" y="264" font-size="10" fill="#b45309">+ getPrice() : Double</text>
  <text x="1036" y="281" font-size="10" fill="#92400e">table: order_item</text>
  <text x="1036" y="298" font-size="10" fill="#92400e">FK: book_id, order_id</text>
  <text x="1036" y="315" font-size="10" fill="#92400e">@JsonIgnore sur order → no circular ref</text>
  <text x="1036" y="332" font-size="10" fill="#92400e">@JsonIgnoreProperties sur user → no loop</text>

  <!-- ══ REVIEW ══ -->
  <rect x="30" y="440" width="250" height="215" rx="10" fill="#faf5ff" stroke="#7c3aed" stroke-width="1.8"/>
  <rect x="30" y="440" width="250" height="32" rx="10" fill="#6d28d9"/>
  <rect x="30" y="458" width="250" height="14" fill="#6d28d9"/>
  <text x="155" y="461" text-anchor="middle" font-size="13" font-weight="bold" fill="#fff">Review</text>
  <line x1="30" y1="472" x2="280" y2="472" stroke="#ddd6fe" stroke-width="1"/>
  <text x="46" y="490" font-size="10" fill="#3b0764">- id : Long</text>
  <text x="46" y="507" font-size="10" fill="#3b0764">- rating : int  (1 à 5)</text>
  <text x="46" y="524" font-size="10" fill="#3b0764">- comment : String</text>
  <text x="46" y="541" font-size="10" fill="#3b0764">- book : Book  @ManyToOne</text>
  <text x="46" y="558" font-size="10" fill="#3b0764">- user : User  @ManyToOne</text>
  <line x1="30" y1="570" x2="280" y2="570" stroke="#ddd6fe" stroke-width="1"/>
  <text x="46" y="588" font-size="10" fill="#6d28d9">+ getRating() : int</text>
  <text x="46" y="605" font-size="10" fill="#6d28d9">+ getComment() : String</text>
  <text x="46" y="622" font-size="10" fill="#6d28d9">+ getBook() : Book</text>
  <text x="46" y="639" font-size="10" fill="#7c3aed">table: review</text>

  <!-- ══ STOCK MOVEMENT ══ -->
  <rect x="340" y="560" width="280" height="340" rx="10" fill="#fff1f2" stroke="#dc2626" stroke-width="1.8"/>
  <rect x="340" y="560" width="280" height="32" rx="10" fill="#b91c1c"/>
  <rect x="340" y="578" width="280" height="14" fill="#b91c1c"/>
  <text x="480" y="581" text-anchor="middle" font-size="13" font-weight="bold" fill="#fff">StockMovement</text>
  <line x1="340" y1="592" x2="620" y2="592" stroke="#fecaca" stroke-width="1"/>
  <text x="356" y="610" font-size="10" fill="#7f1d1d">- id : Long</text>
  <text x="356" y="627" font-size="10" fill="#7f1d1d">- book : Book  @ManyToOne EAGER @JsonIgnoreProperties</text>
  <text x="356" y="644" font-size="10" fill="#7f1d1d">- type : MovementType  @Enumerated(STRING)</text>
  <text x="356" y="661" font-size="10" fill="#7f1d1d">- quantity : Integer  {not null}</text>
  <text x="356" y="678" font-size="10" fill="#7f1d1d">- stockBefore : Integer</text>
  <text x="356" y="695" font-size="10" fill="#7f1d1d">- stockAfter : Integer</text>
  <text x="356" y="712" font-size="10" fill="#7f1d1d">- reason : String  @Column(TEXT)</text>
  <text x="356" y="729" font-size="10" fill="#7f1d1d">- performedBy : String</text>
  <text x="356" y="746" font-size="10" fill="#7f1d1d">- orderId : Long</text>
  <text x="356" y="763" font-size="10" fill="#7f1d1d">- createdAt : LocalDateTime  @PrePersist</text>
  <line x1="340" y1="775" x2="620" y2="775" stroke="#fecaca" stroke-width="1"/>
  <text x="356" y="793" font-size="10" fill="#b91c1c">enum MovementType {</text>
  <text x="356" y="810" font-size="10" fill="#b91c1c">  RESTOCK, SALE, RETURN,</text>
  <text x="356" y="827" font-size="10" fill="#b91c1c">  CORRECTION, LOSS, INITIAL }</text>
  <text x="356" y="844" font-size="10" fill="#dc2626">table: stock_movements</text>
  <text x="356" y="861" font-size="10" fill="#dc2626">Créé dans OrderService lors de chaque SALE</text>

  <!-- ══ VERIFICATION CODE ══ -->
  <rect x="680" y="430" width="270" height="170" rx="10" fill="#f8fafc" stroke="#94a3b8" stroke-width="1.5"/>
  <rect x="680" y="430" width="270" height="32" rx="10" fill="#475569"/>
  <rect x="680" y="448" width="270" height="14" fill="#475569"/>
  <text x="815" y="451" text-anchor="middle" font-size="13" font-weight="bold" fill="#fff">VerificationCode</text>
  <line x1="680" y1="462" x2="950" y2="462" stroke="#cbd5e1" stroke-width="1"/>
  <text x="696" y="480" font-size="10" fill="#334155">- id : Long</text>
  <text x="696" y="497" font-size="10" fill="#334155">- code : String</text>
  <text x="696" y="514" font-size="10" fill="#334155">- email : String</text>
  <text x="696" y="531" font-size="10" fill="#334155">- createdAt : LocalDateTime</text>
  <text x="696" y="548" font-size="10" fill="#334155">- expiresAt : LocalDateTime</text>
  <line x1="680" y1="560" x2="950" y2="560" stroke="#cbd5e1" stroke-width="1"/>
  <text x="696" y="578" font-size="10" fill="#475569">+ isExpired() : boolean</text>

  <!-- ══ LEGEND ══ -->
  <rect x="680" y="630" width="590" height="90" rx="8" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1.2"/>
  <text x="975" y="650" text-anchor="middle" font-size="11" font-weight="bold" fill="#475569">Légende</text>
  <line x1="700" y1="670" x2="750" y2="670" stroke="#d97706" stroke-width="2" marker-end="url(#diamond)"/>
  <text x="760" y="674" font-size="10" fill="#334155">Composition @OneToMany (cascade ALL)</text>
  <line x1="700" y1="692" x2="750" y2="692" stroke="#64748b" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr)"/>
  <text x="760" y="696" font-size="10" fill="#334155">Association @ManyToOne</text>
  <line x1="700" y1="714" x2="750" y2="714" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="760" y="718" font-size="10" fill="#334155">Référence bidirectionnelle @JsonIgnore</text>

  <!-- RELATIONS -->
  <line x1="680" y1="210" x2="280" y2="210" stroke="#64748b" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr)"/>
  <text x="480" y="203" text-anchor="middle" font-size="9" fill="#475569">@ManyToOne  N:1</text>
  <line x1="950" y1="190" x2="1020" y2="190" stroke="#d97706" stroke-width="2" marker-end="url(#diamond)"/>
  <text x="985" y="183" text-anchor="middle" font-size="9" fill="#b45309">1:N</text>
  <line x1="1145" y1="362" x2="1145" y2="410" stroke="#64748b" stroke-width="1.5" stroke-dasharray="5,3"/>
  <line x1="1145" y1="410" x2="610" y2="410" stroke="#64748b" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr)"/>
  <text x="878" y="403" text-anchor="middle" font-size="9" fill="#475569">@ManyToOne  N:1  (book)</text>
  <line x1="280" y1="520" x2="340" y2="380" stroke="#7c3aed" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr)"/>
  <text x="295" y="448" font-size="9" fill="#6d28d9">N:1</text>
  <line x1="155" y1="440" x2="155" y2="354" stroke="#7c3aed" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr)"/>
  <text x="163" y="400" font-size="9" fill="#6d28d9">N:1</text>
  <line x1="480" y1="560" x2="480" y2="522" stroke="#dc2626" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr)"/>
  <text x="490" y="543" font-size="9" fill="#b91c1c">N:1</text>
</svg>
