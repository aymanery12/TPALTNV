spring.application.name=bookstore-ia

# ===== Base de donnees MySQL =====
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.show-sql=true
logging.level.org.hibernate.SQL=DEBUG
logging.level.com.bookstore=DEBUG
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false
spring.jackson.serialization.fail-on-empty-beans=false
spring.jackson.time-zone=Europe/Paris

# ===== SMTP (Gmail) =====
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# ===== Serveur =====
server.port=8080

# JWT_SECRET et GEMINI_API_KEY sont lus directement depuis .env par spring-dotenv
# et injectes via @Value("${JWT_SECRET}") / @Value("${GEMINI_API_KEY}")
