spring.application.name=bookstore-ia

# ===== Base de donnees MySQL =====
# Railway fournit automatiquement MYSQLHOST, MYSQLPORT, MYSQL_DATABASE, MYSQLUSER, MYSQLPASSWORD
# Fallback sur DB_URL/DB_USERNAME/DB_PASSWORD pour le dev local
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://${MYSQLHOST:localhost}:${MYSQLPORT:3306}/${MYSQL_DATABASE:bookstore_db}?useSSL=false&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true}
spring.datasource.username=${MYSQLUSER:${DB_USERNAME:bookstore_user}}
spring.datasource.password=${MYSQLPASSWORD:${DB_PASSWORD:bookstore_pass}}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.show-sql=true
logging.level.org.hibernate.SQL=DEBUG
logging.level.com.bookstore=DEBUG
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false
spring.main.lazy-initialization=true
spring.datasource.hikari.initialization-fail-timeout=0
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.connection-timeout=20000
spring.jackson.serialization.fail-on-empty-beans=false
spring.jackson.time-zone=Europe/Paris

# ===== SMTP (Gmail) =====
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:bookstoreiatpalt@gmail.com}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# ===== Serveur =====
server.port=8080

# JWT_SECRET et GEMINI_API_KEY sont lus directement depuis .env par spring-dotenv
# et injectes via @Value("${JWT_SECRET}") / @Value("${GEMINI_API_KEY}")
