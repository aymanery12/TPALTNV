<div>
  <h3 class="font-bold text-sm mb-2">Catégories</h3>
  <ul class="text-sm space-y-1 text-slate-600 dark:text-slate-400">
    <li *ngFor="let cat of categories">
      <button
        class="transition-colors text-left w-full px-2 py-1 rounded-lg"
        [class.text-amber-400]="activeCategory === cat"
        [class.font-semibold]="activeCategory === cat"
        [class.bg-amber-400]="activeCategory === cat"
        [class.bg-opacity-10]="activeCategory === cat"
        [class.hover:text-amber-400]="activeCategory !== cat"
        (click)="selectCategory(cat)">
        {{ cat }}
      </button>
    </li>
    <li *ngIf="categories.length === 0" class="text-slate-400 italic text-xs px-2">Chargement...</li>
  </ul>
</div>


<div class="border-t border-slate-200 dark:border-slate-800 pt-4">
  <h3 class="font-bold text-sm mb-2">Prix</h3>
  <ul class="text-sm space-y-1 text-slate-600 dark:text-slate-400">
    <li *ngFor="let range of priceRanges">
      <button
        class="transition-colors text-left w-full px-2 py-1 rounded-lg"
        [class.text-amber-400]="activePrice?.label === range.label"
        [class.font-semibold]="activePrice?.label === range.label"
        [class.hover:text-amber-400]="activePrice?.label !== range.label"
        (click)="selectPrice(range)">
        {{ range.label }}
      </button>
    </li>
  </ul>
</div>
