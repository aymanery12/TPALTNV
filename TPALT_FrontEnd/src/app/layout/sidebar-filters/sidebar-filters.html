<div>
  <h3 class="font-bold text-sm mb-2">{{ languageService.t('sidebar.categories') }}</h3>
  <ul class="text-sm space-y-1 text-slate-600 dark:text-slate-400">
    <li *ngFor="let cat of categories">
      <button
        class="transition-colors text-left w-full px-2 py-1 rounded-lg"
        [class.text-amber-400]="isCategoryEqual(activeCategory, cat) && cat !== offersCategoryValue"
        [class.text-red-400]="cat === offersCategoryValue"
        [class.font-semibold]="isCategoryEqual(activeCategory, cat)"
        [class.bg-amber-400]="isCategoryEqual(activeCategory, cat) && cat !== offersCategoryValue"
        [class.bg-red-500]="isCategoryEqual(activeCategory, cat) && cat === offersCategoryValue"
        [class.bg-opacity-10]="isCategoryEqual(activeCategory, cat)"
        [class.hover:text-amber-400]="!isCategoryEqual(activeCategory, cat) && cat !== offersCategoryValue"
        [class.hover:text-red-300]="!isCategoryEqual(activeCategory, cat) && cat === offersCategoryValue"
        (click)="selectCategory(cat)">
        {{ translateCategory(cat) }}
      </button>
    </li>
    <li *ngIf="categories.length === 0" class="text-slate-400 italic text-xs px-2">{{ languageService.t('sidebar.loading') }}</li>
  </ul>
</div>


<div class="border-t border-slate-200 dark:border-slate-800 pt-4">
  <h3 class="font-bold text-sm mb-2">{{ languageService.t('sidebar.price') }}</h3>
  <ul class="text-sm space-y-1 text-slate-600 dark:text-slate-400">
    <li *ngFor="let range of priceRanges">
      <button
        class="transition-colors text-left w-full px-2 py-1 rounded-lg"
        [class.text-amber-400]="activePrice?.label === range.label"
        [class.font-semibold]="activePrice?.label === range.label"
        [class.hover:text-amber-400]="activePrice?.label !== range.label"
        (click)="selectPrice(range)">
        {{ translatePriceRange(range) }}
      </button>
    </li>
  </ul>
</div>
